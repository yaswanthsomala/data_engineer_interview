// ── STATE ─────────────────────────────────────────────────────────────
let state = {
  mode:'browse', cat:'All', filter:'all', search:'',
  expanded:new Set(), bookmarked:new Set(), mastered:new Set(), struggling:new Set(),
  fcIndex:0, fcFlipped:false, fcPool:[],
  quizState:'setup', quizPool:[], quizIndex:0, quizScore:0, quizAnswered:false, quizCat:'All',
};

function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem('dk_prep_state')||'{}');
    if(s.bookmarked)state.bookmarked=new Set(s.bookmarked);
    if(s.mastered)state.mastered=new Set(s.mastered);
    if(s.struggling)state.struggling=new Set(s.struggling);
  }catch(e){}
}
function saveState(){
  try{
    localStorage.setItem('dk_prep_state',JSON.stringify({
      bookmarked:[...state.bookmarked],mastered:[...state.mastered],struggling:[...state.struggling]
    }));
  }catch(e){}
}
loadState();

// ── HELPERS ───────────────────────────────────────────────────────────
function getFiltered(){
  let items=DATA;
  if(state.cat!=='All')items=items.filter(i=>i.cat===state.cat);
  if(state.filter==='bookmarked')items=items.filter(i=>state.bookmarked.has(i.id));
  if(state.filter==='struggling')items=items.filter(i=>state.struggling.has(i.id));
  if(state.search){const s=state.search.toLowerCase();items=items.filter(i=>i.q.toLowerCase().includes(s)||i.a.toLowerCase().includes(s));}
  return items;
}
function getCatCount(c){return c==='All'?DATA.length:DATA.filter(i=>i.cat===c).length;}
function getCatProgress(c){
  const items=c==='All'?DATA:DATA.filter(i=>i.cat===c);
  return items.length?Math.round((items.filter(i=>state.mastered.has(i.id)).length/items.length)*100):0;
}
function formatCode(t){
  return t.replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\b(SELECT|FROM|WHERE|JOIN|LEFT|INNER|FULL|OUTER|GROUP BY|HAVING|ORDER BY|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP|TRUNCATE|WITH|AS|ON|AND|OR|NOT|IN|EXISTS|BETWEEN|LIKE|IS NULL|IS NOT NULL|UNION|ALL|MERGE|EXEC|BEGIN|COMMIT|ROLLBACK|SET|INTO|VALUES|TABLE|INDEX|PROCEDURE|FUNCTION|VIEW|TRIGGER|CDC|CTE|PIVOT|CASE|WHEN|THEN|END|OVER|PARTITION|ROW_NUMBER|RANK|DENSE_RANK|LEAD|LAG|SUM|COUNT|AVG|MAX|MIN|COALESCE|ISNULL|OPTION|RECOMPILE|NOLOCK|TABLOCK|BULK INSERT|BCP|SSIS|OPENJSON|STRING_SPLIT|TOP|LIMIT|OFFSET|FETCH|NEXT|ROWS|UNBOUNDED|PRECEDING|CURRENT)\b/gi,'<code>$1</code>');
}
function toast(msg,icon='fa-circle-check'){
  const c=document.getElementById('toasts'),t=document.createElement('div');
  t.className='toast';t.innerHTML=`<i class="fa-solid ${icon}"></i>${msg}`;c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
function shuffleArray(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function generateDistractors(correct){
  const others=DATA.filter(d=>d.id!==correct.id);
  return shuffleArray(others).slice(0,3).map(s=>s.a.substring(0,130)+'...');
}

// ── RENDER SIDEBAR ────────────────────────────────────────────────────
function renderSidebar(){
  const list=document.getElementById('catList');
  let h=`<div class="cat-item ${state.cat==='All'?'active':''}" data-cat="All">
    <div class="cat-dot" style="background:var(--fg-muted)"></div>
    <div class="cat-name">All Categories</div>
    <div class="cat-count">${DATA.length}</div>
  </div>`;
  CATS.forEach(c=>{
    h+=`<div class="cat-item ${state.cat===c.name?'active':''}" data-cat="${c.name}">
      <div class="cat-dot" style="background:${c.color}"></div>
      <div class="cat-name">${c.name}</div>
      <div class="cat-count">${getCatCount(c.name)}</div>
    </div>
    <div style="padding:0 12px 6px;"><div class="cat-progress"><div class="cat-progress-fill" style="width:${getCatProgress(c.name)}%;background:${c.color}"></div></div></div>`;
  });
  list.innerHTML=h;
  list.querySelectorAll('.cat-item').forEach(el=>{el.addEventListener('click',()=>{state.cat=el.dataset.cat;state.fcIndex=0;state.fcFlipped=false;render();});});
  document.getElementById('statMastered').textContent=state.mastered.size;
  document.getElementById('statStruggling').textContent=state.struggling.size;
  document.getElementById('statBookmarked').textContent=state.bookmarked.size;
  document.getElementById('statRemaining').textContent=DATA.length-state.mastered.size;
}

// ── RENDER BROWSE ─────────────────────────────────────────────────────
function renderBrowse(){
  const items=getFiltered(),content=document.getElementById('content');
  let h=`<div class="browse-header"><h2>${state.cat==='All'?'All Questions':state.cat}</h2><div class="count">${items.length} question${items.length!==1?'s':''}</div></div>`;
  if(!items.length){h+=`<div class="empty-state"><i class="fa-solid fa-ghost"></i><p>No questions match your filters</p></div>`;}
  else{
    h+=`<div class="qa-list">`;
    items.forEach(item=>{
      const co=CATS.find(c=>c.name===item.cat);
      const isOpen=state.expanded.has(item.id),isB=state.bookmarked.has(item.id),isM=state.mastered.has(item.id),isS=state.struggling.has(item.id);
      let cc='qa-card';if(isOpen)cc+=' open';if(isM)cc+=' mastered';else if(isB)cc+=' bookmarked';else if(isS)cc+=' struggling';
      const answerHTML = `<div class="answer-section"><div class="answer-label">Answer</div><div class="answer-text">${formatAnswer(item.a)}</div>${item.code?buildCodeBlock(item.code):''}</div>`;
      h+=`<div class="${cc}" data-id="${item.id}"><div class="qa-q">
        <span class="qa-num">Q${item.id}</span>
        <span class="qa-tag" style="background:${co.color}20;color:${co.color}">${item.cat}</span>
        <span class="qa-q-text">${item.q}</span>
        <div class="qa-q-actions">
          <button class="qa-action-btn ${isB?'bookmarked-btn':''}" data-action="bookmark" data-id="${item.id}" title="Bookmark" aria-label="Bookmark"><i class="fa-solid fa-bookmark"></i></button>
          <button class="qa-action-btn ${isM?'mastered-btn':''}" data-action="mastered" data-id="${item.id}" title="Mastered" aria-label="Mastered"><i class="fa-solid fa-check"></i></button>
          <button class="qa-action-btn ${isS?'struggling-btn':''}" data-action="struggling" data-id="${item.id}" title="Needs work" aria-label="Needs work"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <i class="fa-solid fa-chevron-down expand-icon"></i>
      </div><div class="qa-a ${isOpen?'open':''}"><div class="qa-a-inner">${answerHTML}</div></div></div>`;
    });
    h+=`</div>`;
  }
  content.innerHTML=h;
  content.querySelectorAll('.qa-q').forEach(el=>{el.addEventListener('click',(e)=>{if(e.target.closest('.qa-action-btn'))return;const id=parseInt(el.closest('.qa-card').dataset.id);if(state.expanded.has(id))state.expanded.delete(id);else state.expanded.add(id);renderBrowse();});});
  content.querySelectorAll('.qa-action-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();const id=parseInt(btn.dataset.id),a=btn.dataset.action;
    if(a==='bookmark'){if(state.bookmarked.has(id)){state.bookmarked.delete(id);toast('Bookmark removed','fa-bookmark');}else{state.bookmarked.add(id);toast('Bookmarked','fa-bookmark');}}
    else if(a==='mastered'){if(state.mastered.has(id)){state.mastered.delete(id);toast('Unmarked','fa-rotate-left');}else{state.mastered.add(id);state.struggling.delete(id);toast('Marked as mastered','fa-circle-check');}}
    else if(a==='struggling'){if(state.struggling.has(id)){state.struggling.delete(id);toast('Removed from weak list','fa-rotate-left');}else{state.struggling.add(id);state.mastered.delete(id);toast('Added to weak list','fa-triangle-exclamation');}}
    saveState();renderSidebar();renderBrowse();
  });});
}

// ── RENDER FLASHCARD ──────────────────────────────────────────────────
function renderFlashcard(){
  const content=document.getElementById('content');
  if(!state.fcPool.length){state.fcPool=shuffleArray(getFiltered());state.fcIndex=0;state.fcFlipped=false;}
  if(!state.fcPool.length){content.innerHTML=`<div class="empty-state"><i class="fa-solid fa-ghost"></i><p>No questions in this category</p></div>`;return;}
  const item=state.fcPool[state.fcIndex],total=state.fcPool.length,current=state.fcIndex+1,pct=Math.round((current/total)*100);
  const co=CATS.find(c=>c.name===item.cat);
  content.innerHTML=`<div class="flashcard-container">
    <div class="flashcard-progress"><span>${current} / ${total}</span><div class="flashcard-progress-bar"><div class="flashcard-progress-fill" style="width:${pct}%"></div></div><span>${pct}%</span></div>
    <div class="flashcard ${state.fcFlipped?'flipped':''}" id="flashcard"><div class="flashcard-inner">
      <div class="flashcard-front"><div class="fc-label"><span class="qa-tag" style="background:${co.color}20;color:${co.color}">${item.cat}</span> &middot; Q${item.id}</div><div class="fc-question">${item.q}</div><div class="fc-hint"><i class="fa-solid fa-hand-pointer"></i> Click or press Space to reveal</div></div>
      <div class="flashcard-back"><div class="fc-label">Answer &middot; Q${item.id}</div><div class="fc-answer">${formatCode(item.a)}</div></div>
    </div></div>
    <div class="fc-btns">
      <button class="fc-btn red" id="fcStruggle"><i class="fa-solid fa-xmark"></i> Struggled</button>
      <button class="fc-btn skip" id="fcSkip"><i class="fa-solid fa-forward"></i> Skip</button>
      <button class="fc-btn green" id="fcGotIt"><i class="fa-solid fa-check"></i> Got it</button>
    </div>
  </div>`;
  document.getElementById('flashcard').addEventListener('click',(e)=>{if(e.target.closest('.fc-btn'))return;state.fcFlipped=!state.fcFlipped;document.getElementById('flashcard').classList.toggle('flipped',state.fcFlipped);});
  document.getElementById('fcGotIt').addEventListener('click',()=>{state.mastered.add(item.id);state.struggling.delete(item.id);saveState();renderSidebar();advanceFC();});
  document.getElementById('fcStruggle').addEventListener('click',()=>{state.struggling.add(item.id);state.mastered.delete(item.id);saveState();renderSidebar();advanceFC();});
  document.getElementById('fcSkip').addEventListener('click',()=>advanceFC());
}
function advanceFC(){state.fcFlipped=false;state.fcIndex++;if(state.fcIndex>=state.fcPool.length){state.fcPool=[];toast('Deck complete! Shuffling again.','fa-rotate');}renderFlashcard();}

// ── RENDER QUIZ ───────────────────────────────────────────────────────
function renderQuiz(){
  const c=document.getElementById('content');
  if(state.quizState==='setup')renderQuizSetup(c);
  else if(state.quizState==='active')renderQuizActive(c);
  else renderQuizResults(c);
}
function renderQuizSetup(c){
  let h=`<div class="quiz-setup"><h2>Quick Quiz</h2><p>Test your recall with multiple-choice questions. Choose a category.</p><div class="quiz-setup-options">
    <div class="quiz-setup-opt ${state.quizCat==='All'?'selected':''}" data-qcat="All"><span>All Categories</span><small>${DATA.length} questions</small></div>`;
  CATS.forEach(ct=>{h+=`<div class="quiz-setup-opt ${state.quizCat===ct.name?'selected':''}" data-qcat="${ct.name}"><span>${ct.name}</span><small>${getCatCount(ct.name)} questions</small></div>`;});
  h+=`</div><button class="quiz-start-btn" id="quizStart">Start Quiz (10 questions)</button></div>`;
  c.innerHTML=h;
  c.querySelectorAll('.quiz-setup-opt').forEach(el=>{el.addEventListener('click',()=>{state.quizCat=el.dataset.qcat;renderQuiz();});});
  document.getElementById('quizStart').addEventListener('click',startQuiz);
}
function startQuiz(){
  let pool=state.quizCat==='All'?[...DATA]:DATA.filter(i=>i.cat===state.quizCat);
  pool=shuffleArray(pool).slice(0,10);
  state.quizPool=pool.map(item=>{const d=generateDistractors(item);return{...item,options:shuffleArray([{text:item.a,correct:true},...d.map(x=>({text:x,correct:false}))])};});
  state.quizIndex=0;state.quizScore=0;state.quizAnswered=false;state.quizState='active';renderQuiz();
}
function renderQuizActive(c){
  const qi=state.quizPool[state.quizIndex],letters=['A','B','C','D'],co=CATS.find(ct=>ct.name===qi.cat);
  let h=`<div class="quiz-container"><div class="quiz-header"><h2>Question ${state.quizIndex+1} of ${state.quizPool.length}</h2><div class="quiz-score"><span>Score: <strong>${state.quizScore}/${state.quizIndex+(state.quizAnswered?1:0)}</strong></span></div></div>
  <div class="quiz-card"><div class="quiz-q-num"><span class="qa-tag" style="background:${co.color}20;color:${co.color}">${qi.cat}</span> &middot; Q${qi.id}</div><div class="quiz-q-text">${qi.q}</div><div class="quiz-options">`;
  qi.options.forEach((o,i)=>{
    let cls='quiz-opt';if(state.quizAnswered){cls+=' disabled';if(o.correct)cls+=' correct';else if(o._selected)cls+=' wrong';}
    h+=`<div class="${cls}" data-idx="${i}"><span class="opt-letter">${letters[i]}</span><span>${formatCode(o.text)}</span></div>`;
  });
  h+=`</div><div class="quiz-explanation ${state.quizAnswered?'show':''}">${formatCode(qi.a)}</div></div>
  <button class="quiz-next ${state.quizAnswered?'show':''}" id="quizNext">${state.quizIndex<state.quizPool.length-1?'Next Question':'See Results'}</button></div>`;
  c.innerHTML=h;
  if(!state.quizAnswered){c.querySelectorAll('.quiz-opt').forEach(el=>{el.addEventListener('click',()=>{qi.options[parseInt(el.dataset.idx)]._selected=true;state.quizAnswered=true;if(qi.options[parseInt(el.dataset.idx)].correct)state.quizScore++;renderQuizActive(c);});});}
  const nb=document.getElementById('quizNext');if(nb)nb.addEventListener('click',()=>{state.quizIndex++;state.quizAnswered=false;if(state.quizIndex>=state.quizPool.length)state.quizState='results';renderQuiz();});
}
function renderQuizResults(c){
  const total=state.quizPool.length,pct=Math.round((state.quizScore/total)*100),wrong=total-state.quizScore;
  let msg=pct>=80?'Excellent work! You really know your stuff.':pct>=60?'Good effort! A few areas to brush up on.':'Keep practicing — review the weak areas and try again.';
  c.innerHTML=`<div class="quiz-results">
    <div class="score-circle"><div class="pct">${pct}%</div><div class="lbl">SCORE</div></div>
    <h2>${pct>=80?'Outstanding!':pct>=60?'Well Done!':'Keep Going!'}</h2><p>${msg}</p>
    <div class="stats-row">
      <div class="stat-item"><div class="val green">${state.quizScore}</div><div class="lbl">Correct</div></div>
      <div class="stat-item"><div class="val red">${wrong}</div><div class="lbl">Wrong</div></div>
      <div class="stat-item"><div class="val">${total}</div><div class="lbl">Total</div></div>
    </div>
    <div class="result-btns">
      <button class="fc-btn green" id="quizRetry"><i class="fa-solid fa-rotate"></i> Retry Same</button>
      <button class="fc-btn skip" id="quizNew"><i class="fa-solid fa-shuffle"></i> New Quiz</button>
      <button class="fc-btn" id="quizBack"><i class="fa-solid fa-arrow-left"></i> Setup</button>
    </div>
  </div>`;
  document.getElementById('quizRetry').addEventListener('click',()=>{state.quizIndex=0;state.quizScore=0;state.quizAnswered=false;state.quizPool.forEach(qi=>qi.options.forEach(o=>delete o._selected));state.quizState='active';renderQuiz();});
  document.getElementById('quizNew').addEventListener('click',()=>{state.quizState='setup';renderQuiz();});
  document.getElementById('quizBack').addEventListener('click',()=>{state.quizState='setup';renderQuiz();});
}

// ── SQL SYNTAX HIGHLIGHTING ───────────────────────────────────────────
function highlightSQL(code) {
  // escape HTML first
  code = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // comments (-- ...)
  code = code.replace(/(--[^\n]*)/g,'<span class="sc">$1</span>');
  // block comments
  code = code.replace(/(\/\*[\s\S]*?\*\/)/g,'<span class="sc">$1</span>');
  // strings
  code = code.replace(/(N?'(?:[^'\\]|\\.)*')/g,'<span class="ss">$1</span>');
  // SQL keywords
  const kw = ['SELECT','FROM','WHERE','JOIN','LEFT','RIGHT','INNER','FULL','OUTER','CROSS','ON',
    'GROUP BY','ORDER BY','HAVING','PARTITION BY','AS','AND','OR','NOT','IN','EXISTS','BETWEEN',
    'LIKE','IS NULL','IS NOT NULL','UNION ALL','UNION','INTERSECT','EXCEPT','CASE','WHEN','THEN',
    'ELSE','END','WITH','MERGE','USING','MATCHED','BY SOURCE','BY TARGET','OUTPUT','INTO',
    'INSERT','UPDATE','DELETE','TRUNCATE','CREATE','ALTER','DROP','BEGIN','COMMIT','ROLLBACK',
    'TRANSACTION','SET','VALUES','TABLE','INDEX','PROCEDURE','FUNCTION','VIEW','TRIGGER',
    'PRIMARY KEY','FOREIGN KEY','UNIQUE','DEFAULT','NOT NULL','IDENTITY','REFERENCES',
    'EXEC','EXECUTE','DECLARE','IF','WHILE','RETURN','THROW','RAISERROR','TRY','CATCH',
    'OFFSET','FETCH NEXT','FETCH','ROWS ONLY','UNBOUNDED PRECEDING','CURRENT ROW','FOLLOWING',
    'OVER','DISTINCT','TOP','ALL','SOME','ANY','NULL','TRUE','FALSE','GO'];
  // sort by length desc so longer phrases match first
  kw.sort((a,b)=>b.length-a.length);
  kw.forEach(k=>{
    const re = new RegExp('(?<![\\w>])(' + k.replace(/ /g,'\\s+') + ')(?![\\w<])', 'gi');
    code = code.replace(re,'<span class="sk">$1</span>');
  });
  // functions
  const fns = ['ROW_NUMBER','RANK','DENSE_RANK','LEAD','LAG','NTILE','FIRST_VALUE','LAST_VALUE',
    'SUM','COUNT','AVG','MAX','MIN','COALESCE','ISNULL','NULLIF','CAST','TRY_CAST','CONVERT',
    'GETDATE','SYSDATETIMEOFFSET','DATEADD','DATEDIFF','DATENAME','DATEPART','YEAR','MONTH',
    'DAY','EOMONTH','FORMAT','STRING_AGG','STRING_SPLIT','CONCAT','LEN','LTRIM','RTRIM','TRIM',
    'UPPER','LOWER','REPLACE','SUBSTRING','CHARINDEX','PATINDEX','IIF','CHOOSE','HASHBYTES',
    'NEWID','ABS','ROUND','CEILING','FLOOR','SQRT','POWER','LOG','OBJECT_NAME','OBJECT_ID',
    'DB_ID','DB_NAME','SYSTEM_USER','SUSER_NAME','HAS_PERMS_BY_NAME','OPENJSON','OPENROWSET',
    'JSON_VALUE','JSON_QUERY','FOR JSON','FOR XML','QUOTENAME','PARSENAME','SWITCHOFFSET',
    'TODATETIMEOFFSET','AT TIME ZONE','fn_cdc_get','sp_executesql','sp_send_dbmail',
    'sp_updatestats','sp_whoisactive','CHECKSUM_AGG','BINARY_CHECKSUM'];
  fns.sort((a,b)=>b.length-a.length);
  fns.forEach(f=>{
    const re = new RegExp('(?<![\\w>./])(' + f.replace(/\(/g,'\\(') + ')(?=[\\s(,<]|$)', 'gi');
    code = code.replace(re,'<span class="sf">$1</span>');
  });
  // data types
  code = code.replace(/(?<![<\w])\b(INT|BIGINT|SMALLINT|TINYINT|BIT|DECIMAL|NUMERIC|FLOAT|REAL|MONEY|SMALLMONEY|CHAR|NCHAR|VARCHAR|NVARCHAR|TEXT|NTEXT|DATE|DATETIME|DATETIME2|DATETIMEOFFSET|TIME|SMALLDATETIME|UNIQUEIDENTIFIER|VARBINARY|BINARY|IMAGE|ROWVERSION|SQL_VARIANT|XML|MAX)\b(?![<\w])/g,'<span class="st">$1</span>');
  // numbers
  code = code.replace(/(?<![<\w'@])\b(\d+(?:\.\d+)?)\b(?![>\w])/g,'<span class="sn">$1</span>');
  // variables and params
  code = code.replace(/(?<![<])(@{1,2}[\w]+)/g,'<span class="st">$1</span>');
  return code;
}

function buildCodeBlock(code) {
  return `<div class="code-block">
    <div class="code-block-header">
      <div class="code-block-dots"><span></span><span></span><span></span></div>
      <div class="code-block-label">SQL</div>
    </div>
    <pre>${highlightSQL(code)}</pre>
  </div>`;
}

function formatAnswer(a) {
  // Convert backticks to inline code, bold keywords in answers
  return a
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\b(WHERE|HAVING|GROUP BY|JOIN|INNER JOIN|LEFT JOIN|SELECT|FROM|CTE|SCD|ACID|ETL|ELT|CDC|MERGE|UNION ALL|UNION|TRUNCATE|DELETE|ROW_NUMBER|DENSE_RANK|RANK|LEAD|LAG|COALESCE|ISNULL|NULLIF|RCSI|NOLOCK|TABLOCK|MAXDOP|PIVOT|PARTITION BY|OVER|EXPLAIN|L1|L2|L3|P1|P2|P3|P4|RCA|SLA|OLTP|OLAP)\b/g, '<strong>$1</strong>');
}

function render(){renderSidebar();if(state.mode==='browse')renderBrowse();else if(state.mode==='flashcard')renderFlashcard();else renderQuiz();}

// ── EVENT LISTENERS ───────────────────────────────────────────────────
document.querySelectorAll('.mode-tab').forEach(tab=>{tab.addEventListener('click',()=>{state.mode=tab.dataset.mode;state.fcPool=[];state.quizState='setup';document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');render();});});
document.getElementById('searchInput').addEventListener('input',(e)=>{state.search=e.target.value;state.expanded.clear();if(state.mode==='browse')renderBrowse();else{state.fcPool=[];if(state.mode==='flashcard')renderFlashcard();}});
function setFilter(f){
  state.filter=f;state.expanded.clear();
  document.querySelectorAll('.topbar-actions .top-btn').forEach(b=>b.classList.remove('accent'));
  if(f==='bookmarked')document.getElementById('filterBookmarked').classList.add('accent');
  else if(f==='struggling')document.getElementById('filterStruggling').classList.add('accent');
  else document.getElementById('filterNone').classList.add('accent');
  render();
}
document.getElementById('filterNone').addEventListener('click',()=>setFilter('all'));
document.getElementById('filterBookmarked').addEventListener('click',()=>setFilter(state.filter==='bookmarked'?'all':'bookmarked'));
document.getElementById('filterStruggling').addEventListener('click',()=>setFilter(state.filter==='struggling'?'all':'struggling'));
document.getElementById('expandAll').addEventListener('click',()=>{const items=getFiltered();const all=items.every(i=>state.expanded.has(i.id));if(all)state.expanded.clear();else items.forEach(i=>state.expanded.add(i.id));renderBrowse();});
document.getElementById('hamburger').addEventListener('click',()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('show');});
document.getElementById('sidebarOverlay').addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('show');});

// Keyboard shortcuts for flashcards
document.addEventListener('keydown',(e)=>{
  if(state.mode!=='flashcard'||!state.fcPool.length)return;
  if(e.key===' '||e.key==='Enter'){e.preventDefault();state.fcFlipped=!state.fcFlipped;const fc=document.getElementById('flashcard');if(fc)fc.classList.toggle('flipped',state.fcFlipped);}
  if(e.key==='ArrowRight'&&state.fcFlipped){state.mastered.add(state.fcPool[state.fcIndex].id);state.struggling.delete(state.fcPool[state.fcIndex].id);saveState();renderSidebar();advanceFC();}
  if(e.key==='ArrowLeft'&&state.fcFlipped){state.struggling.add(state.fcPool[state.fcIndex].id);state.mastered.delete(state.fcPool[state.fcIndex].id);saveState();renderSidebar();advanceFC();}
  if(e.key==='ArrowDown')advanceFC();
});
