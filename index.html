<script>
// ── COMPLETE DATA: 200 Q&As across 10 categories ─────────────────────
const DATA = [
  // ── Core SQL (Q1–Q30) ──
  {id:1,q:"What is the difference between WHERE and HAVING?",a:"WHERE filters rows before grouping; HAVING filters after GROUP BY. Use WHERE to filter raw data, HAVING to filter aggregated results like HAVING COUNT(*) > 5.",cat:"Core SQL"},
  {id:2,q:"Explain CTEs and when to use them.",a:"CTEs use the WITH clause to define a named temporary result set. They simplify complex queries, improve readability, and avoid repeating subqueries. Non-materialized by default in SQL Server.",cat:"Core SQL"},
  {id:3,q:"What are Window Functions? Name five.",a:"Window functions perform calculations across related rows without collapsing them. Key examples: ROW_NUMBER(), RANK(), DENSE_RANK(), LEAD(), LAG(), SUM() OVER(), AVG() OVER().",cat:"Core SQL"},
  {id:4,q:"Difference between RANK() and DENSE_RANK().",a:"RANK() leaves gaps after ties (1,1,3); DENSE_RANK() does not (1,1,2). Use DENSE_RANK() when you want consecutive ranking without gaps.",cat:"Core SQL"},
  {id:5,q:"What is a correlated subquery?",a:"A correlated subquery references columns from the outer query and re-executes for each row. E.g., finding employees earning above their department average. Can be slow on large datasets — often rewritable as a JOIN.",cat:"Core SQL"},
  {id:6,q:"How do you find duplicate records?",a:"Use GROUP BY with HAVING: SELECT col1, col2, COUNT(*) FROM table GROUP BY col1, col2 HAVING COUNT(*) > 1. To retrieve full rows, join this result back to the original table.",cat:"Core SQL"},
  {id:7,q:"Explain INNER JOIN, LEFT JOIN, and FULL OUTER JOIN.",a:"INNER JOIN returns only matching rows. LEFT JOIN returns all left rows plus matching right (NULLs for no match). FULL OUTER JOIN returns all rows from both sides with NULLs where there's no match.",cat:"Core SQL"},
  {id:8,q:"What is a self-join?",a:"A self-join joins a table to itself. Common use: finding employees and their managers from the same employees table using manager_id = emp_id.",cat:"Core SQL"},
  {id:9,q:"How do you find the 2nd highest salary without TOP/LIMIT?",a:"Use DENSE_RANK(): SELECT salary FROM (SELECT salary, DENSE_RANK() OVER (ORDER BY salary DESC) AS rnk FROM employees) t WHERE rnk = 2. Or use nested MAX.",cat:"Core SQL"},
  {id:10,q:"Difference between UNION and UNION ALL?",a:"UNION removes duplicate rows; UNION ALL keeps all rows including duplicates. UNION ALL is faster as it skips deduplication — use it when you know there are no duplicates or duplicates are acceptable.",cat:"Core SQL"},
  {id:11,q:"How do you pivot data in SQL?",a:"Use PIVOT in SQL Server or conditional aggregation: MAX(CASE WHEN col='A' THEN val END) AS A with GROUP BY. Dynamic pivot uses dynamic SQL when column values aren't known at compile time.",cat:"Core SQL"},
  {id:12,q:"What is a recursive CTE?",a:"A recursive CTE calls itself. Used for hierarchical data like org charts: anchor member (base case) UNION ALL recursive member (joins back to the CTE). Must include a termination condition.",cat:"Core SQL"},
  {id:13,q:"How do you handle NULL values in SQL?",a:"Use IS NULL / IS NOT NULL for filtering. Use ISNULL(col, default) or COALESCE(col1, col2) for substitution. Never use = NULL — it always returns unknown.",cat:"Core SQL"},
  {id:14,q:"What is COALESCE vs ISNULL?",a:"COALESCE is ANSI-standard, accepts multiple arguments, returns the first non-NULL. ISNULL is SQL Server-specific, takes only two arguments. Prefer COALESCE for portability.",cat:"Core SQL"},
  {id:15,q:"Explain DELETE, TRUNCATE, and DROP.",a:"DELETE: removes rows, fully logged, can be rolled back, respects WHERE. TRUNCATE: removes all rows, minimal logging, faster, usually cannot be rolled back, resets identity. DROP: removes the entire table structure and data permanently.",cat:"Core SQL"},
  {id:16,q:"What is a stored procedure and why use it?",a:"A stored procedure is a pre-compiled SQL routine stored in the database. Benefits: reusability, performance via cached execution plans, enhanced security (grant EXECUTE without exposing tables), reduced network traffic.",cat:"Core SQL"},
  {id:17,q:"Stored procedure vs function?",a:"Functions must return a value and can be used in SELECT statements. Procedures can return multiple result sets and perform DML. Functions cannot have side effects (no INSERT/UPDATE/DELETE on tables in most cases).",cat:"Core SQL"},
  {id:18,q:"How do you optimize a slow SQL query?",a:"Check the execution plan for table scans. Add appropriate indexes. Rewrite correlated subqueries as JOINs. Avoid SELECT *. Filter early. Use covering indexes. Break complex queries into CTEs. Update statistics.",cat:"Core SQL"},
  {id:19,q:"What is an execution plan and how do you read it?",a:"An execution plan shows how SQL Server processes your query. Look for: Table Scans (add indexes), Key Lookups (add covering index), Sort operations (add index on ORDER BY), high cost operators, and discrepancies between estimated and actual rows.",cat:"Core SQL"},
  {id:20,q:"What are indexes? Types and trade-offs?",a:"Indexes speed up reads but slow down writes. Clustered index defines physical row order (one per table). Non-clustered creates a separate lookup structure. Covering index includes all query columns. Filtered index covers a row subset.",cat:"Core SQL"},
  {id:21,q:"What is index fragmentation and how do you fix it?",a:"Fragmentation occurs from page splits due to data modifications. Check with sys.dm_db_index_physical_stats. Rebuild (>30% fragmentation) drops and recreates; Reorganize (10-30%) defragments in place with less overhead.",cat:"Core SQL"},
  {id:22,q:"Explain ACID properties and transactions.",a:"ACID: Atomicity (all or nothing), Consistency (data stays valid), Isolation (transactions don't interfere), Durability (committed data persists). Managed with BEGIN TRANSACTION, COMMIT, ROLLBACK.",cat:"Core SQL"},
  {id:23,q:"What are isolation levels in SQL Server?",a:"READ UNCOMMITTED (dirty reads), READ COMMITTED (default, no dirty reads), REPEATABLE READ (no non-repeatable reads), SERIALIZABLE (no phantom reads, strictest), SNAPSHOT (row versioning, readers don't block writers).",cat:"Core SQL"},
  {id:24,q:"What is a deadlock and how do you prevent it?",a:"Deadlock: two transactions each hold a lock the other needs. Prevent by: accessing objects in consistent order, keeping transactions short, using RCSI to reduce contention, and monitoring with deadlock trace flags (1222, 1204).",cat:"Core SQL"},
  {id:25,q:"How do you pass a list of values to a stored procedure?",a:"Options: table-valued parameters (TVP) — cleanest and typed; STRING_SPLIT() in SQL Server 2016+; JSON with OPENJSON; or split function for older versions. TVPs allow the full set to be passed in one parameter.",cat:"Core SQL"},
  {id:26,q:"What is dynamic SQL?",a:"Dynamic SQL builds SQL strings at runtime using EXEC() or sp_executesql. Use when column/table names are dynamic. Always use sp_executesql with parameters to prevent SQL injection. Avoid when not necessary — harder to debug.",cat:"Core SQL"},
  {id:27,q:"How do you compare two tables for differences?",a:"Use EXCEPT: SELECT * FROM tableA EXCEPT SELECT * FROM tableB. For bidirectional diff: use FULL OUTER JOIN checking NULLs on both sides. Add checksum comparison for performance on large tables.",cat:"Core SQL"},
  {id:28,q:"What is normalization? 1NF, 2NF, 3NF?",a:"1NF: atomic values, no repeating groups. 2NF: 1NF + no partial dependency on composite key. 3NF: 2NF + no transitive dependency. Most OLTP systems target 3NF. Higher normal forms exist but are less common in practice.",cat:"Core SQL"},
  {id:29,q:"What is denormalization and when is it appropriate?",a:"Denormalization adds planned redundancy to reduce joins and improve read performance. Appropriate for reporting databases, OLAP, and heavily-read tables where join cost outweighs storage cost.",cat:"Core SQL"},
  {id:30,q:"How do you calculate a running total in SQL?",a:"SUM() with OVER(): SELECT date, amount, SUM(amount) OVER (ORDER BY date ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS running_total FROM transactions. The ROWS clause ensures correct behavior with ties.",cat:"Core SQL"},

  // ── Performance Tuning (Q31–Q55) ──
  {id:31,q:"How do you identify slow queries in SQL Server?",a:"Use sys.dm_exec_query_stats to find top CPU/elapsed time queries. Query Store in SQL Server 2016+ tracks plan history and regressions. SQL Profiler and Extended Events for real-time capture. Slow query logs in MySQL.",cat:"Performance Tuning"},
  {id:32,q:"What is a covering index?",a:"A covering index includes all columns required by a query — both filter and select — eliminating base table lookups. Turns a Key Lookup into an Index Seek, dramatically reducing I/O for read-heavy queries.",cat:"Performance Tuning"},
  {id:33,q:"Index Seek vs Index Scan?",a:"Index Seek: navigates B-tree directly to matching rows — efficient, low I/O. Index Scan: reads all index pages — used when many rows match or no good index exists. Seek is almost always preferred for selective queries.",cat:"Performance Tuning"},
  {id:34,q:"What causes a query to NOT use an index?",a:"Functions on indexed columns (YEAR(date_col)), implicit type conversions, leading wildcard LIKE '%text', very low selectivity, or the optimizer deciding a scan is cheaper when most rows qualify all prevent index usage.",cat:"Performance Tuning"},
  {id:35,q:"What is parameter sniffing?",a:"SQL Server compiles a stored procedure plan based on the first parameter values seen. If those aren't representative, subsequent executions use a suboptimal plan. Fix with OPTION(RECOMPILE), OPTIMIZE FOR UNKNOWN, or local variables.",cat:"Performance Tuning"},
  {id:36,q:"How do you use an execution plan to tune a query?",a:"Look for: Table Scans (add index), Key Lookups (add covering index), Sort operations (index the ORDER BY column), high estimated vs actual rows (update statistics), Nested Loops on large sets (consider Hash Match join).",cat:"Performance Tuning"},
  {id:37,q:"What is statistics in SQL Server?",a:"Statistics are histograms of column value distributions used by the optimizer to estimate row counts. Stale statistics cause bad plans. Update with UPDATE STATISTICS or enable AUTO_UPDATE_STATISTICS. Always update after large data loads.",cat:"Performance Tuning"},
  {id:38,q:"How do you reduce I/O in SQL queries?",a:"Select only needed columns (no SELECT *). Filter early with WHERE before joins. Use covering indexes. Partition large tables to enable elimination. Archive old data. Use columnstore indexes for analytical queries scanning millions of rows.",cat:"Performance Tuning"},
  {id:39,q:"What is a columnstore index?",a:"Columnstore indexes store data column-by-column, enabling batch mode execution and high compression ratios. Ideal for aggregating millions of rows in analytical queries. Not suited for frequent OLTP point lookups or high-frequency updates.",cat:"Performance Tuning"},
  {id:40,q:"How do you handle large table joins efficiently?",a:"Ensure join columns are indexed on both sides. Filter before joining using CTEs or subqueries. Use hash joins for large unsorted datasets. Avoid joining on computed or function-wrapped columns. Consider query hints when optimizer makes bad choices.",cat:"Performance Tuning"},
  {id:41,q:"What is table partitioning?",a:"Partitioning splits a large table into smaller, physically separate chunks based on a partition key (typically date). Queries benefit from partition elimination — only relevant partitions are scanned. Essential for very large tables (100M+ rows).",cat:"Performance Tuning"},
  {id:42,q:"How do you minimize blocking in SQL Server?",a:"Keep transactions short. Use RCSI to prevent read/write contention. Index well to achieve row-level locks instead of table-level. Monitor with sys.dm_exec_requests and sys.dm_os_waiting_tasks. Use NOLOCK only for non-critical reads.",cat:"Performance Tuning"},
  {id:43,q:"What is RCSI?",a:"RCSI uses row versioning in tempdb so readers see the last committed row version instead of waiting for locks. Eliminates read/write blocking. Improves concurrency at the cost of tempdb usage. Enable at database level.",cat:"Performance Tuning"},
  {id:44,q:"How do you tune a nightly batch process?",a:"Process in small batches (1000-10000 rows). Use set-based operations instead of cursors. Disable non-clustered indexes before bulk load, rebuild after. Use appropriate recovery model. Schedule during off-peak. Track progress with a checkpoint column.",cat:"Performance Tuning"},
  {id:45,q:"Cursor vs set-based approach?",a:"Cursors process row-by-row (RBAR), which is extremely slow at scale due to per-row overhead and lock management. Set-based operations process entire datasets at once using SQL's optimization engine. Always prefer set-based; cursors only as last resort.",cat:"Performance Tuning"},
  {id:46,q:"How do you improve INSERT performance for bulk data?",a:"Use BULK INSERT or BCP for file-based loads. Disable non-clustered indexes before bulk operations, rebuild after. Use TABLOCK hint. Switch to BULK_LOGGED recovery model for minimal logging. Use TVPs for application-based batch inserts.",cat:"Performance Tuning"},
  {id:47,q:"What is tempdb and why does it matter?",a:"tempdb stores temp tables, work tables for sorts/hash joins, and the row version store for RCSI. Contention on allocation pages (GAM, SSGAM) can become a server-wide bottleneck. Best practice: multiple data files equal to logical CPU count.",cat:"Performance Tuning"},
  {id:48,q:"Missing index recommendations — should you always follow them?",a:"DMV recommendations are based on query patterns but may be incomplete or conflicting. Always evaluate: overlap with existing indexes, impact on write performance, frequency of the query, and whether it's truly a hot path. Don't blindly create all suggestions.",cat:"Performance Tuning"},
  {id:49,q:"How do you find unused indexes?",a:"Query sys.dm_db_index_usage_stats for indexes with zero user seeks/scans but high user updates — these slow writes without helping reads. Validate over a representative period (weeks, not days) to account for infrequent queries.",cat:"Performance Tuning"},
  {id:50,q:"What is query parallelism?",a:"Parallelism splits query execution across CPUs — great for large analytical queries, harmful for OLTP due to overhead and CXPACKET waits. Tune via MAXDOP at server, database, or query level (OPTION(MAXDOP 1) for OLTP queries that shouldn't go parallel).",cat:"Performance Tuning"},
  {id:51,q:"How do you monitor SQL Server performance proactively?",a:"Use sys.dm_os_wait_stats (top wait types), sys.dm_exec_query_stats (expensive queries), Query Store (regression detection), PerfMon counters (PLE, Batch Requests/sec), and Extended Events for targeted workload tracing.",cat:"Performance Tuning"},
  {id:52,q:"What is Page Life Expectancy (PLE)?",a:"PLE measures how long data pages stay in the buffer pool. General guideline: >300 seconds per 4GB of RAM. Low PLE means data is being evicted from memory constantly, causing excessive physical I/O. Monitor via PerfMon: SQLServer:Buffer Manager.",cat:"Performance Tuning"},
  {id:53,q:"How do you optimize a query with multiple LEFT JOINs?",a:"Ensure all join columns are indexed. Evaluate if all LEFT JOINs are truly necessary. Filter rows early via CTEs. Check execution plan for hash spills to tempdb. Break query into steps to isolate which JOIN is most expensive.",cat:"Performance Tuning"},
  {id:54,q:"What is the NOLOCK hint and its risks?",a:"NOLOCK allows reading uncommitted data, avoiding shared locks. Risks: dirty reads (uncommitted rows), phantom reads, non-repeatable reads. Use only for non-critical reporting where approximate data is acceptable. Never use on financial or audit queries.",cat:"Performance Tuning"},
  {id:55,q:"What is STATISTICS IO?",a:"SET STATISTICS IO ON reports logical reads, physical reads, and read-ahead reads per table. High logical reads = excessive data scanning. Compare before/after optimization to quantify exactly how much I/O you've reduced. A key metric for proving optimization impact.",cat:"Performance Tuning"},

  // ── Data Engineering (Q56–Q80) ──
  {id:56,q:"What is ETL vs ELT?",a:"ETL transforms data before loading into the target warehouse. ELT loads raw data first, then transforms inside the target — common in cloud warehouses (BigQuery, Snowflake, Redshift) where compute is cheap and raw data storage is valuable.",cat:"Data Engineering"},
  {id:57,q:"How do you handle data quality in a pipeline?",a:"Implement validation rules at ingestion (null checks, range checks, format validation). Track row counts and checksums. Route rejected records to error tables. Alert on threshold breaches. Use data contracts between source and consuming teams.",cat:"Data Engineering"},
  {id:58,q:"What is incremental loading vs full load?",a:"Full load replaces all data each run — simple but expensive for large datasets. Incremental load processes only new/changed rows using a watermark (last_modified_date, auto-increment ID). Always prefer incremental for tables with millions of rows.",cat:"Data Engineering"},
  {id:59,q:"What is a slowly changing dimension (SCD)?",a:"SCD tracks dimension changes over time. Type 1: overwrite (no history). Type 2: add new row with effective dates (preserves full history — most common). Type 3: add column for previous value (limited history). Type 2 is standard in enterprise data warehouses.",cat:"Data Engineering"},
  {id:60,q:"How do you implement SCD Type 2 in SQL?",a:"For SCD Type 2: detect change via hash comparison or column diff. UPDATE old row: set is_current=0, end_date=today. INSERT new row: is_current=1, start_date=today, end_date=NULL. Use MERGE statement for atomic upsert or explicit UPDATE + INSERT in a transaction.",cat:"Data Engineering"},
  {id:61,q:"Star schema vs Snowflake schema?",a:"Star schema: fact table + denormalized dimensions — fewer joins, faster BI queries, simpler for report writers. Snowflake schema: normalized dimensions with sub-dimensions — less redundancy but more joins. Star is preferred for performance-sensitive BI/reporting.",cat:"Data Engineering"},
  {id:62,q:"How do you perform data reconciliation?",a:"Compare: row counts, sum of key financial fields, hash of critical columns, distinct value sets between source and target. Use EXCEPT queries or FULL OUTER JOIN to identify specific discrepancies. Document every mismatch before closing reconciliation.",cat:"Data Engineering"},
  {id:63,q:"What is the MERGE statement?",a:"MERGE combines INSERT, UPDATE, and DELETE in one atomic statement based on a match condition. Ideal for syncing target from source (upsert patterns). Be aware of MERGE edge cases with multiple matches and always test with realistic data volumes.",cat:"Data Engineering"},
  {id:64,q:"What are database triggers?",a:"Triggers fire automatically on INSERT/UPDATE/DELETE. Useful for audit logging and enforcing complex constraints. Avoid for complex business logic (hidden side effects, hard to debug), high-frequency tables (performance impact), and cascading operations.",cat:"Data Engineering"},
  {id:65,q:"How do you handle failed records in a pipeline?",a:"Route failed records to a dead-letter/error table with error details and timestamps. Alert when error rate exceeds threshold. Design pipelines for idempotent reprocessing. Never silently drop records — every failure must be traceable and reprocessable.",cat:"Data Engineering"},
  {id:66,q:"What is idempotency in data pipelines?",a:"An idempotent pipeline produces the same result regardless of how many times it runs for the same input. Achieve with UPSERT/MERGE patterns, natural key deduplication, and wrapping each batch in a transaction. Essential for reliable pipeline restarts.",cat:"Data Engineering"},
  {id:67,q:"How do you schedule and monitor SQL jobs?",a:"SQL Server Agent for scheduled jobs with step definitions, schedules, and failure alerts. Job history queryable via msdb. For cloud: Azure Data Factory, Apache Airflow, or AWS Glue for orchestration with dependency management and retry logic.",cat:"Data Engineering"},
  {id:68,q:"What is CDC (Change Data Capture)?",a:"CDC captures row-level changes (INSERT/UPDATE/DELETE) to source tables and stores them in change tables. In SQL Server, enable with sp_cdc_enable_table. Used for incremental pipeline feeds without scanning entire source tables.",cat:"Data Engineering"},
  {id:69,q:"How do you load CSV data into SQL Server?",a:"BULK INSERT for simple file imports. BCP for scripted imports/exports. SSIS for complex transformations. OPENROWSET for ad hoc queries. Always validate column mappings, delimiters, encoding (UTF-8 vs ANSI), and NULL handling before production load.",cat:"Data Engineering"},
  {id:70,q:"What is data lineage?",a:"Data lineage tracks data origin, movement, and transformations from source to destination. Critical for: debugging data quality issues, regulatory compliance (GDPR, SOX audits), and understanding the blast radius when source systems change.",cat:"Data Engineering"},
  {id:71,q:"How do you handle schema changes in source systems?",a:"Use flexible staging (load raw as VARCHAR, validate before casting). Implement schema drift detection. Alert when source schema changes. Version ETL scripts in source control. Maintain data contracts with source teams and communicate changes upstream.",cat:"Data Engineering"},
  {id:72,q:"Surrogate key vs natural key?",a:"Natural key: business identifier from source (customer_id). Surrogate key: system-generated integer with no business meaning. Use surrogate keys in DW to decouple from source changes and correctly handle SCD Type 2 (same natural key, multiple surrogate rows).",cat:"Data Engineering"},
  {id:73,q:"What is a fact table and its types?",a:"Transaction fact: one row per event (sales transaction). Periodic snapshot: one row per period per entity (daily account balance). Accumulating snapshot: one row per business process lifecycle updated as milestones are reached (order fulfillment pipeline).",cat:"Data Engineering"},
  {id:74,q:"How do you monitor data pipeline health?",a:"Track: row counts per run vs historical average, run duration trends, error rates, last successful run timestamp, data freshness lag. Alert on anomalies. Build a monitoring dashboard from SQL queries against an audit log table populated by each pipeline run.",cat:"Data Engineering"},
  {id:75,q:"What is a data lakehouse?",a:"A data lakehouse combines raw file storage (S3/ADLS) with ACID transactions and schema enforcement. Technologies: Delta Lake, Apache Iceberg. Enables both BI (structured SQL queries) and ML (unstructured data access) on the same storage layer.",cat:"Data Engineering"},
  {id:76,q:"How do you handle timezone differences?",a:"Always store timestamps in UTC internally. Convert to local timezone only at the reporting/display layer. Use DATETIMEOFFSET in SQL Server for timezone-aware storage. Document timezone assumptions explicitly in data dictionaries and pipeline metadata.",cat:"Data Engineering"},
  {id:77,q:"What is a data catalog?",a:"A data catalog is a metadata repository documenting datasets, schemas, owners, lineage, and usage patterns. Tools: Azure Purview, AWS Glue Data Catalog, Apache Atlas, Alation. Enables data discovery, governance, and self-service analytics.",cat:"Data Engineering"},
  {id:78,q:"How do you ensure no data loss on pipeline restart?",a:"Use checkpointing — record the last successfully processed batch ID or timestamp in a control table. On restart, resume from that checkpoint. Wrap each batch in a transaction so failures leave the target in a consistent state with no partial writes.",cat:"Data Engineering"},
  {id:79,q:"What is a data mesh?",a:"Data mesh distributes data ownership to domain teams who treat data as a product. Each domain owns, produces, and serves its own data. Contrasts with centralized lake/warehouse. Promotes domain ownership, self-serve infrastructure, and federated governance.",cat:"Data Engineering"},
  {id:80,q:"Describe your SQL reporting automation experience.",a:"At Accenture: I identified that report generation required manually running multiple SQL queries and copying results into Excel. I replaced this with a single automated SQL script that joined all required tables, applied the business logic, and output a ready-to-send dataset. Saved 100+ hours/month.",cat:"Data Engineering"},

  // ── Production Support (Q81–Q100) ──
  {id:81,q:"Walk me through a P1 production data incident.",a:"1) Acknowledge within SLA. 2) Assess impact and blast radius. 3) Engage DBA, App, and Infrastructure teams. 4) Apply immediate mitigation (rollback, data fix, service restart). 5) Validate fix. 6) Post-incident: write RCA with timeline, root cause, and preventive actions.",cat:"Production Support"},
  {id:82,q:"What is Root Cause Analysis (RCA)?",a:"RCA is a structured process to find the underlying cause of an incident, not just the symptom. Techniques: 5 Whys, fishbone diagram, timeline analysis. Output: root cause, contributing factors, immediate fix, and permanent preventive action with owner and due date.",cat:"Production Support"},
  {id:83,q:"How do you perform data reconciliation after an incident?",a:"Compare source vs target row counts, sum of key financial fields, hash of critical columns. Use SQL EXCEPT queries to find missing rows. Check for transformation logic gaps at each pipeline step. Document every discrepancy. Get business sign-off before closing.",cat:"Production Support"},
  {id:84,q:"How do you fix a data mismatch between two systems?",a:"1) Identify the discrepancy scope — how many rows, which columns, how large the difference. 2) Trace the data flow step by step to pinpoint where the divergence occurred. 3) Review transformation logic and ETL logs. 4) Fix and reprocess affected records. 5) Add validation to prevent recurrence.",cat:"Production Support"},
  {id:85,q:"How do you manage high-priority incidents under pressure?",a:"Stay methodical: document each action taken with timestamps. Communicate status every 15-30 minutes to stakeholders. Delegate parallel tracks — one team on immediate mitigation, another on RCA. Avoid untested production fixes — always test in staging first when time permits.",cat:"Production Support"},
  {id:86,q:"What is SLA and how do you ensure compliance?",a:"SLA defines contractual response and resolution time commitments (e.g., P1 respond in 15min, resolve in 4hr). Ensure compliance with: real-time monitoring dashboards, automated pre-breach alerts, clear escalation paths, and a priority matrix (P1-P4) shared across teams.",cat:"Production Support"},
  {id:87,q:"How do you handle a production job that fails silently?",a:"Implement row count validation at each step. Add explicit RAISERROR/THROW for error conditions. Use TRY/CATCH in stored procedures. Set up heartbeat monitoring — alert if a job doesn't complete by its expected time window. Treat missing completion as a failure.",cat:"Production Support"},
  {id:88,q:"How do you roll back a bad data deployment?",a:"If inside a transaction: ROLLBACK TRANSACTION. If already committed: apply a compensating transaction reversing the DML. If schema changed: restore from backup or apply a pre-written rollback script. Always test rollback procedures in a non-production environment.",cat:"Production Support"},
  {id:89,q:"What is a post-mortem and what makes a good one?",a:"A good blameless post-mortem includes: incident timeline, what happened and why, business impact quantification, what worked and didn't in the response, concrete action items with owners and due dates. Focus on process improvements, never individual blame.",cat:"Production Support"},
  {id:90,q:"How do you handle a recurring production issue?",a:"First: implement quick mitigation to restore service. Then: perform thorough root cause analysis. Implement a permanent fix (code change, index, data guard, validation rule). Monitor to confirm the issue stops recurring. Update the runbook with the fix for future reference.",cat:"Production Support"},
  {id:91,q:"What monitoring did you implement at Accenture?",a:"Built SQL-driven monitoring jobs that checked: data load completion status, row counts vs expected thresholds, null rates on critical columns, and processing lag (time since last update). Sent alerts via Database Mail/ServiceNow before business users were impacted.",cat:"Production Support"},
  {id:92,q:"How do you triage a sudden increase in database load?",a:"Check sys.dm_exec_requests for blocking queries and their wait types. Check sys.dm_os_wait_stats for top resource waits. Use sys.dm_exec_query_stats to identify sudden new expensive queries. Look for job overlaps, statistics going stale, or a new query plan caused by parameter sniffing.",cat:"Production Support"},
  {id:93,q:"How do you document production incidents?",a:"Use a structured incident log: timestamp, reporter, priority, affected systems, symptoms, steps taken, resolution time, RCA, and preventive actions. Store in ServiceNow. Use aggregated incident reports for monthly trend analysis and proactive improvement initiatives.",cat:"Production Support"},
  {id:94,q:"What tools have you used for incident tracking?",a:"ServiceNow for incident ticketing and SLA tracking. SQL queries against monitoring and audit tables for real-time health checks. Database Mail for automated alerts. SQL Server Agent job history for job execution tracking. Teams/email for escalation communication.",cat:"Production Support"},
  {id:95,q:"How do you ensure data accuracy after a production fix?",a:"Run pre-defined reconciliation queries comparing source vs target at the record level. Validate all business rules (referential integrity, no negative values, expected ranges). Get business analyst or data owner sign-off. Log all validation results in an audit table with timestamps.",cat:"Production Support"},
  {id:96,q:"L1 vs L2 vs L3 support?",a:"L1: first-line triage — restart jobs, check obvious symptoms, escalate if unresolved within threshold. L2: deeper SQL analysis, data investigation, root cause identification, data fixes. L3: architectural issues, code changes, database schema modifications — involving senior engineers or DBAs.",cat:"Production Support"},
  {id:97,q:"How do you prioritize multiple simultaneous incidents?",a:"Use an impact × urgency matrix. P1 (business-critical, users impacted) always comes first. Communicate to all stakeholders about what's being worked on and what's queued. Delegate lower-priority issues to team members while you focus on the critical one.",cat:"Production Support"},
  {id:98,q:"Have you proactively prevented an incident?",a:"Yes — I noticed a data feed consistently arriving late, causing downstream job failures. Before it became a P1, I built a monitoring alert that triggered if the feed didn't arrive by a configurable threshold time, giving the team 30-60 minutes to investigate and remediate proactively.",cat:"Production Support"},
  {id:99,q:"How do you handle access to production for data fixes?",a:"Follow change management: raise a change request, get approval, execute in the approved maintenance window with peer oversight, log every SQL statement executed with timestamps, validate the fix, close the ticket with validation evidence. Never make ad-hoc production changes.",cat:"Production Support"},
  {id:100,q:"How do you reduce alert fatigue in monitoring?",a:"Tune thresholds based on historical baselines — not one-size-fits-all. Implement severity tiers (page only for P1/P2, email for P3/P4). Group related alerts to avoid alert storms from a single root cause. Review and retire stale alert rules in monthly monitoring reviews.",cat:"Production Support"},

  // ── Tech Lead / Leadership (Q101–Q120) ──
  {id:101,q:"What does a Tech Lead do differently from a Senior Developer?",a:"A Tech Lead owns the technical direction: architecture decisions, code quality standards, technical risk mitigation, cross-team communication, mentoring, and unblocking the team. A Senior Developer focuses primarily on individual technical delivery within a defined scope.",cat:"Tech Lead / Leadership"},
  {id:102,q:"How do you mentor junior team members?",a:"Pair programming on complex problems. Detailed educational code reviews (explain why, not just what). Progressively complex task assignments with a safety net. Internal knowledge-sharing sessions. Creating psychological safety so they ask questions without fear.",cat:"Tech Lead / Leadership"},
  {id:103,q:"How do you balance technical debt vs new features?",a:"Quantify the cost of the debt (incidents caused, time lost, developer friction). Negotiate a tech debt budget (e.g., 20% of each sprint). Prioritize debt that causes recurring incidents or blocks performance improvements. Make it visible to product management with clear business impact framing.",cat:"Tech Lead / Leadership"},
  {id:104,q:"How do you handle disagreement on technical decisions?",a:"Facilitate a structured discussion: present each option's trade-offs and evaluation criteria. Use data where possible (benchmarks, failure history). Build consensus through reasoning. If stuck after reasonable debate: make a time-boxed decision, document the rationale, and agree to revisit if key assumptions change.",cat:"Tech Lead / Leadership"},
  {id:105,q:"How do you ensure code quality in the team?",a:"Define and enforce coding standards. Mandate peer code reviews for all changes. Require unit test coverage thresholds. Use static analysis tools in the CI pipeline. Conduct regular architecture reviews. Most importantly: lead by example with your own code quality and review thoroughness.",cat:"Tech Lead / Leadership"},
  {id:106,q:"How would you design a data pipeline from scratch?",a:"Define: source systems, data volume/frequency, transformation rules, SLAs, and consumers. Design: ingestion layer, transformation (validation + business rules), storage model, serving layer. Build in: error handling, monitoring, retry logic, and idempotency. Plan for schema evolution from day one.",cat:"Tech Lead / Leadership"},
  {id:107,q:"How do you communicate technical issues to non-technical stakeholders?",a:"Translate to business impact: 'This query taking 10s means reports take 2 minutes to load, affecting 50 analysts daily — costing ~1.5 hours of productivity.' Skip technical jargon. Present options with trade-offs. Focus on what decision needs to be made and the business consequences of each path.",cat:"Tech Lead / Leadership"},
  {id:108,q:"How do you handle poorly written inherited SQL code?",a:"First: understand the intent without rewriting blindly. Add tests to establish a baseline. Document what the code does. Refactor incrementally — prioritize the slowest or most fragile sections. Create a tech debt backlog item with business impact justification for the larger cleanup effort.",cat:"Tech Lead / Leadership"},
  {id:109,q:"Describe your experience leading incident resolution.",a:"At Accenture as SQL SME: I led P1 bridge calls coordinating DBA, application, and infrastructure teams simultaneously. I triaged using SQL analysis, identified root cause, developed and tested a fix in staging, applied with DBA oversight, validated all affected records, and authored the post-incident RCA — all within our P1 SLA.",cat:"Tech Lead / Leadership"},
  {id:110,q:"How do you estimate effort for SQL development tasks?",a:"Break down into components: query complexity, data volume, testing requirements, deployment risk, and integration dependencies. Reference historical velocity for similar tasks. Add 20-30% buffer for unknowns. Communicate assumptions explicitly. Revisit estimates when scope changes and never absorb scope creep silently.",cat:"Tech Lead / Leadership"},
  {id:111,q:"How do you onboard a new team member quickly?",a:"Provide: system documentation and data model overview. Assign a buddy/mentor. Give a starter task touching the most critical systems. Schedule knowledge-sharing sessions with each team member. Set clear 30/60/90-day goals. Provide feedback early and often, not just at review time.",cat:"Tech Lead / Leadership"},
  {id:112,q:"What metrics do you use to measure team health?",a:"Quantitative: cycle time, incident rate, MTTR, deployment frequency, test coverage, code review turnaround. Qualitative: team satisfaction from 1:1s, psychological safety indicators. Balance velocity with quality — a fast team shipping bugs is slower overall.",cat:"Tech Lead / Leadership"},
  {id:113,q:"How do you handle an underperforming team member?",a:"Have a direct, empathetic 1:1 conversation. Understand the root cause — skill gap, unclear expectations, personal issues, or misalignment. Set clear, measurable expectations with a timeline. Provide support (mentoring, training, workload adjustments). Document and escalate to management if no improvement after support period.",cat:"Tech Lead / Leadership"},
  {id:114,q:"How do you make architectural decisions under uncertainty?",a:"Use time-boxed spikes/POCs to reduce uncertainty before committing to an approach. Document all assumptions and risks explicitly. Prefer reversible decisions — avoid irreversible choices under uncertainty. Start with the simplest solution that meets current needs; plan for extensibility without over-engineering.",cat:"Tech Lead / Leadership"},
  {id:115,q:"What is your approach to documentation?",a:"Document as you go, not as a final step. Treat documentation as code: version-controlled, reviewed, and kept current. Priority order: runbooks for operations (so anyone can handle incidents), data dictionary for data models, ADRs (Architecture Decision Records) for major technical choices.",cat:"Tech Lead / Leadership"},
  {id:116,q:"How do you ensure knowledge is not siloed in the team?",a:"Rotate module ownership across team members. Require documentation for all critical processes as a definition of done. Hold weekly knowledge-sharing sessions. Pair engineers across modules. Build comprehensive runbooks so any team member can handle any production scenario independently.",cat:"Tech Lead / Leadership"},
  {id:117,q:"How do you plan capacity for a growing data platform?",a:"Monitor current utilization trends (storage, CPU, query volume, connection count). Project growth from the business roadmap. Maintain 20-30% headroom. Plan scaling milestones before they become urgent. For SQL Server: consider partitioning, archiving, read replicas, or cloud migration based on the growth trajectory.",cat:"Tech Lead / Leadership"},
  {id:118,q:"How do you stay current with SQL and data trends?",a:"Follow SQL Server blog and Microsoft documentation for engine updates. Data Engineering Weekly and Towards Data Science for broader trends. Experiment with dbt, Delta Lake, and Python pipelines in personal projects. Pursue certifications (DP-300, DP-203). Attend internal and external tech talks.",cat:"Tech Lead / Leadership"},
  {id:119,q:"What would you improve in your current team's processes?",a:"Introduce: automated data quality monitoring framework, SQL code review templates, central data dictionary, formal post-mortem process for incidents. Establish recurring architecture review sessions and a tech debt backlog visible to product management.",cat:"Tech Lead / Leadership"},
  {id:120,q:"How do you handle pressure to cut corners on data quality?",a:"Quantify the risk in business terms: 'Skipping this validation means we could deliver incorrect data to clients — we've seen that cost X hours of remediation in the past.' Offer a risk-based middle ground. Always get written acknowledgment from management when accepting data quality risk on their behalf.",cat:"Tech Lead / Leadership"},

  // ── Behavioural (Q121–Q140) ──
  {id:121,q:"Tell me about yourself.",a:"I'm a SQL Developer and Data Engineer with 7+ years at Accenture, specializing in production support, SQL performance tuning, and data pipeline automation. I've served as SQL SME, saved 100+ hours through automation, and mentored junior engineers. I'm targeting SQL Developer, Data Engineer, and Tech Lead roles where I can drive data reliability at scale.",cat:"Behavioural"},
  {id:122,q:"What is your biggest achievement?",a:"Automating client reporting using SQL — saving 100+ hours of monthly manual effort. I identified the bottleneck, designed the automation, validated accuracy, and handed it over seamlessly. The impact was immediate: zero manual effort and zero errors on report delivery.",cat:"Behavioural"},
  {id:123,q:"Describe a time you resolved a critical production issue.",a:"A data mismatch was causing incorrect workflow states for hundreds of records. I used SQL analysis to trace the issue to a transformation bug in the last release. Developed and tested a fix script in staging, applied it in production with DBA oversight, validated all affected records, and resolved the incident within our P1 SLA.",cat:"Behavioural"},
  {id:124,q:"Tell me about a time you improved a process.",a:"I noticed the team spent 1-2 hours daily manually loading data files. I built an automated SQL job that detected new files, validated them, loaded them, and sent a completion notification — reducing the manual effort to near zero and improving reliability.",cat:"Behavioural"},
  {id:125,q:"Describe a conflict with a team member and how you resolved it.",a:"A teammate disagreed on the approach for a reconciliation script. I proposed we each build a prototype and benchmark both on real data. Their approach was simpler; mine was faster. We combined the best of both — the experience strengthened our collaboration.",cat:"Behavioural"},
  {id:126,q:"Tell me about a time you failed and what you learned.",a:"Early in my career, I deployed a SQL fix without sufficient staging testing, causing a downstream job failure. I learned to always test in staging, maintain a rollback plan, and never underestimate edge cases. I made this part of our team's deployment standard.",cat:"Behavioural"},
  {id:127,q:"How do you handle working under tight deadlines?",a:"Prioritize the critical path ruthlessly. Communicate early if a deadline is at risk — never surprise stakeholders at the end. Break work into smaller deliverables to show progress and enable early feedback. Negotiate scope reduction rather than compromising quality.",cat:"Behavioural"},
  {id:128,q:"What motivates you in your work?",a:"Solving complex data problems with real business impact. Building systems that are reliable and that other teams can trust. Mentoring junior engineers. And the constant learning — data engineering evolves fast and I enjoy staying ahead of the curve.",cat:"Behavioural"},
  {id:129,q:"Why are you looking to switch?",a:"After 7+ years building deep SQL and data engineering expertise at Accenture, I'm ready for a role with greater technical ownership — leading a data team or solving more complex engineering challenges at a product company with a strong engineering culture.",cat:"Behavioural"},
  {id:130,q:"Why do you want this role?",a:"This role aligns with my strengths in SQL, data reliability, and production systems. I'm drawn to the opportunity to take technical ownership, work on higher-complexity data challenges, and contribute to a product-focused engineering culture with direct business impact.",cat:"Behavioural"},
  {id:131,q:"Where do you see yourself in 3–5 years?",a:"As a Data Engineering Tech Lead or Principal Data Engineer — owning end-to-end data platform architecture, mentoring a team, and enabling data-driven business decisions. I'm also investing in cloud data engineering (Azure/AWS) and Python to accelerate this trajectory.",cat:"Behavioural"},
  {id:132,q:"Describe your leadership style.",a:"Collaborative and outcome-oriented. I lead by setting clear expectations, removing blockers, and empowering the team within agreed guardrails. I balance technical depth with communication — I can write the SQL and explain the business impact to stakeholders.",cat:"Behavioural"},
  {id:133,q:"How do you handle ambiguous requirements?",a:"Ask clarifying questions to understand the business outcome, not just the functional requirement. Document assumptions explicitly. Deliver a working prototype early to validate direction. Build in review checkpoints rather than big-bang delivery at the end.",cat:"Behavioural"},
  {id:134,q:"Tell me about a time you proactively identified a risk.",a:"I noticed a data feed consistently had late arrivals that caused downstream failures. Before it became a P1, I built an alert that triggered if the feed didn't arrive by a threshold time — preventing future incidents proactively rather than reactively.",cat:"Behavioural"},
  {id:135,q:"How do you manage multiple priorities?",a:"Priority matrix: impact × urgency. P1 first, always. Communicate clearly to all stakeholders about what's in focus and what's queued. Time-box investigation tasks to avoid rabbit holes. Re-prioritize explicitly when new critical issues arrive and document the decision.",cat:"Behavioural"},
  {id:136,q:"Describe a time you worked with cross-functional teams.",a:"Incident resolution at Accenture required coordinating DBA, application developers, and infrastructure teams simultaneously. I acted as the technical bridge — translating SQL findings into specific actionable tasks for each team and maintaining a shared status update every 15 minutes.",cat:"Behavioural"},
  {id:137,q:"What are your strengths?",a:"Advanced SQL and query optimization, production incident analysis, data pipeline automation, proactive monitoring design, and cross-functional communication. Proven ability to convert reactive firefighting into systematic preventive systems.",cat:"Behavioural"},
  {id:138,q:"What are your areas for improvement?",a:"Building cloud data engineering skills — Azure Data Factory, Databricks, and Python-based pipelines to complement my strong SQL foundation. Also working on executive-level communication for higher-stakes stakeholder presentations and business cases.",cat:"Behavioural"},
  {id:139,q:"How do you handle receiving critical feedback?",a:"I actively seek it. When I receive it, I listen fully without defensiveness, ask clarifying questions to understand the specific concern, take time to reflect, and then act on it systematically. I document feedback and revisit it during regular self-reviews.",cat:"Behavioural"},
  {id:140,q:"What makes you stand out from other candidates?",a:"7 years of deep production SQL expertise combined with proven automation delivery (100+ hours saved), proactive monitoring systems, and SME-level incident leadership. I bring both technical depth and the communication skills to lead a data team effectively at this experience level.",cat:"Behavioural"},

  // ── Scenario-Based (Q141–Q145) ──
  {id:141,q:"A report that ran in 2s now takes 45s. What do you do?",a:"1) Check if data volume grew significantly. 2) Check Query Store for plan regressions. 3) Run sp_recompile to force recompile — check for parameter sniffing. 4) Update statistics. 5) Look for new blocking/locking. 6) Compare current vs cached plan history to identify what changed.",cat:"Scenario-Based"},
  {id:142,q:"A nightly ETL job failed at 3 AM. How do you handle it?",a:"1) Alert stakeholders immediately with realistic ETA. 2) Check SQL Agent job error logs for the failure step. 3) Assess whether partial data was loaded and if re-run is safe (idempotency). 4) Fix the error and rerun from last checkpoint. 5) Validate output before 8 AM. 6) Send impact summary to business.",cat:"Scenario-Based"},
  {id:143,q:"You find 10,000 duplicate rows in production. What's your approach?",a:"1) Understand root cause before deleting anything. 2) Identify the natural key and duplicate criteria. 3) Determine which row is 'correct' per business rules (latest timestamp, source priority). 4) Write and test deduplication script in staging. 5) Apply in a transaction, validate counts, commit. 6) Add a unique constraint to prevent recurrence.",cat:"Scenario-Based"},
  {id:144,q:"How would you design a monitoring system for a production database?",a:"Define key metrics (job completion, row counts, error rates, query latency). Build SQL Agent jobs checking these every N minutes. Alert via Database Mail or ServiceNow when thresholds breach. Store results in a monitoring log table. Build a simple SQL dashboard querying that table. Review weekly for trend analysis.",cat:"Scenario-Based"},
  {id:145,q:"A client says their report numbers don't match the source. What do you do?",a:"1) Reproduce with specific record examples — don't accept vague descriptions. 2) Trace the data flow from source through each transformation step. 3) Compare row counts, sums, and hashes at each stage. 4) Identify the exact step where divergence occurs. 5) Fix the root cause, reprocess affected data, validate end-to-end, and report findings to the client.",cat:"Scenario-Based"},

  // ── Tools & Cloud (Q146–Q165) ──
  {id:146,q:"What is Azure Data Factory and when would you use it?",a:"ADF is a cloud-native ETL/ELT orchestration service. Use it when you need to build data pipelines at scale with built-in connectors to 100+ sources, managed compute via Integration Runtimes, and visual pipeline designer. Ideal for lift-and-shift from SSIS or greenfield cloud pipelines.",cat:"Tools & Cloud"},
  {id:147,q:"Explain the difference between SSIS and Azure Data Factory.",a:"SSIS is on-premises ETL with rich transform components, strong debugging, and SSISDB catalog. ADF is cloud-native, code-first (JSON definitions), scales elastically, and integrates natively with Azure services. ADF doesn't have built-in transforms — it relies on compute (SQL, Databricks, Synapse) for transformation.",cat:"Tools & Cloud"},
  {id:148,q:"What is Databricks and how does it fit in a data architecture?",a:"Databricks is a unified analytics platform built on Apache Spark. Use it for large-scale data transformations, ML model training, and ad hoc analysis. In a modern architecture: ADF orchestrates, Databricks transforms, Delta Lake provides ACID storage, and Synapse/Snowflake serves the data.",cat:"Tools & Cloud"},
  {id:149,q:"What is dbt and why is it popular?",a:"dbt (data build tool) enables SQL-based transformations with software engineering practices: version control, testing, documentation, and incremental models. It follows the ELT paradigm — transforms happen inside the warehouse. Popular because it empowers analysts to own transformations without Spark/Java.",cat:"Tools & Cloud"},
  {id:150,q:"How does Snowflake differ from traditional databases?",a:"Snowflake separates storage and compute — scale each independently. It uses a columnar format with automatic clustering. Supports time travel and zero-copy cloning. Multi-cluster shared data architecture enables concurrent workloads without contention. No index management needed.",cat:"Tools & Cloud"},
  {id:151,q:"What are Azure Synapse Analytics and its components?",a:"Synapse is an integrated analytics service with three components: Synapse SQL (serverless and dedicated pools for T-SQL queries), Synapse Spark for big data processing, and Synapse Pipelines for orchestration (similar to ADF). Unified workspace for SQL and Spark on the same data.",cat:"Tools & Cloud"},
  {id:152,q:"Explain Delta Lake and its key features.",a:"Delta Lake adds ACID transactions, schema enforcement, and time travel to data lake storage. Uses transaction logs (JSON + Parquet). Supports MERGE, UPDATE, DELETE on lake files. Enables streaming + batch on the same table. Key technology behind the lakehouse pattern.",cat:"Tools & Cloud"},
  {id:153,q:"What is Apache Airflow and how does it compare to SQL Agent?",a:"Airflow is a Python-based workflow orchestrator using DAGs (Directed Acyclic Graphs). Unlike SQL Agent: supports complex dependency graphs, integrates with any system via operators, has a rich UI, and scales horizontally. SQL Agent is simpler for pure SQL jobs but limited in flexibility.",cat:"Tools & Cloud"},
  {id:154,q:"How do you use Python in data engineering?",a:"Python for: ETL scripting (pandas, pyodbc for SQL connectivity), pipeline orchestration (Airflow), data validation (Great Expectations), API integrations (requests), and notebook-based transformations (Databricks, Jupyter). Complements SQL for non-SQL sources and programmatic logic.",cat:"Tools & Cloud"},
  {id:155,q:"What is Git and why is it important for SQL developers?",a:"Git provides version control for SQL scripts, stored procedures, and pipeline code. Essential for: tracking changes, branching for features, code review via pull requests, rollback capability, and audit trail. Treat SQL code like application code — never modify production directly without a PR.",cat:"Tools & Cloud"},
  {id:156,q:"How do you use SSIS for data loading?",a:"SSIS packages with Data Flow Tasks: source → transformations (Derived Column, Lookup, Conditional Split) → destination. Use ForEach Loop for file batching. Configure logging to SSISDB. Use project deployment model for parameterization. Handle errors with event handlers and error outputs.",cat:"Tools & Cloud"},
  {id:157,q:"What is a Linked Server and when should you avoid it?",a:"Linked Server connects SQL Server to external data sources (Oracle, another SQL instance, Excel). Avoid for: frequent large data transfers (slow, unreliable), complex joins across servers (poor optimization). Prefer: SSIS/ADF for data movement, OPENQUERY for simple pass-through queries.",cat:"Tools & Cloud"},
  {id:158,q:"How do you monitor Azure Data Factory pipelines?",a:"Use ADF Monitor tab for pipeline runs, activity details, and trigger history. Store run metadata in a custom log table using a Stored Procedure activity. Set up Azure Monitor alerts for pipeline failures. Use Diagnostic Settings to send logs to Log Analytics for trend analysis.",cat:"Tools & Cloud"},
  {id:159,q:"What is SQL Server Integration Runtime in ADF?",a:"IR is the compute infrastructure for ADF pipeline execution. Self-Hosted IR: installed on-premises or VM for accessing local data sources. Azure IR: managed compute for cloud-to-cloud operations. SSIS IR: managed SSIS runtime for lifting SSIS packages to Azure.",cat:"Tools & Cloud"},
  {id:160,q:"How do you implement CI/CD for SQL databases?",a:"Use DACPACs or SQL projects in Visual Studio for schema versioning. Build pipeline compiles the project. Release pipeline deploys via SqlPackage or Azure Sql cmdlets. Use pre/post deployment scripts for data migrations. Never hand-write migration scripts — use tools that generate idempotent changes.",cat:"Tools & Cloud"},
  {id:161,q:"What are Azure Key Vault and Managed Identities?",a:"Key Vault stores secrets, keys, and certificates securely. Managed Identities (MSI) allow Azure resources to authenticate to Key Vault without credentials. In pipelines: use MSI to fetch connection strings at runtime instead of hardcoding. Eliminates credential rotation burden and improves security posture.",cat:"Tools & Cloud"},
  {id:162,q:"How do you handle large file processing in Azure?",a:"For files >1GB: use PolyBase or COPY INTO for bulk loading into dedicated SQL pool. Use ADF with Binary format and compression (gzip) to reduce transfer time. Partition large files before processing. For extremely large datasets, use Databricks with Spark distributed processing.",cat:"Tools & Cloud"},
  {id:163,q:"What is Power BI and how do you optimize its data layer?",a:"Power BI is a BI visualization tool. Optimize: use Import mode for small datasets, DirectQuery for large live data (ensure underlying queries are optimized), create semantic model with proper relationships, use aggregations for DirectQuery, and implement incremental refresh for large imported datasets.",cat:"Tools & Cloud"},
  {id:164,q:"Describe your experience with AWS data services.",a:"AWS Glue for ETL (PySpark jobs), S3 for raw data lake storage, Redshift for warehousing, Athena for serverless querying on S3, Step Functions for orchestration. CloudFormation or Terraform for infrastructure-as-code. Same architectural patterns as Azure — just different service names.",cat:"Tools & Cloud"},
  {id:165,q:"What is Terraform and why use it for data platforms?",a:"Terraform is infrastructure-as-code that provisions cloud resources declaratively. Use it for: consistent environment setup (dev/staging/prod), version-controlled infrastructure changes, and reproducible teardown/rebuild. Essential for data platforms with multiple interconnected services (storage, compute, networking).",cat:"Tools & Cloud"},

  // ── Salary & Culture (Q166–Q185) ──
  {id:166,q:"What is your current CTC and expectation?",a:"Frame it around market value, not just a number: 'Based on my research for 7+ year SQL/Data Engineer roles, the market range is 18-22 LPA. I'm looking for a role that values data reliability expertise and offers growth. I'm open to discussing total compensation including benefits, bonuses, and ESOPs.'",cat:"Salary & Culture"},
  {id:167,q:"How do you justify your salary expectation?",a:"Quantify your value: 100+ hours saved monthly through automation, P1 incident leadership, SME-level SQL expertise, mentoring that raised team capability. Compare with market benchmarks from Glassdoor/AmbitionBox. Frame it as ROI — the company saves more than your cost through reduced incidents and automation.",cat:"Salary & Culture"},
  {id:168,q:"Are you open to a lower salary for the right role?",a:"Don't immediately say yes — it signals low confidence. Instead: 'I'm flexible on structure. If the base is lower, I'd want to understand the growth trajectory, variable pay potential, and learning opportunities. What I'm not flexible on is the role being genuinely challenging and the team having strong engineering culture.'",cat:"Salary & Culture"},
  {id:169,q:"What benefits matter most to you besides salary?",a:"Learning budget for certifications and conferences. Flexible work arrangements (hybrid with 2-3 days WFO). Health insurance that covers family. A team where I can own technical decisions, not just execute tickets. Equity or ESOPs at a product company signal long-term alignment.",cat:"Salary & Culture"},
  {id:170,q:"How do you handle a lowball offer?",a:"Acknowledge gracefully: 'I appreciate the offer. Based on my 7 years of specialized experience and the value I bring, I was expecting closer to X. Can we discuss how we bridge this gap — perhaps through a signing bonus, faster review cycle, or adjusted variable component?' Always negotiate; never accept first offer.",cat:"Salary & Culture"},
  {id:171,q:"What is your notice period and how do you handle it?",a:"Be honest about notice period (typically 60-90 days at Accenture). Proactively say: 'I'll ensure a thorough knowledge transfer, document all runbooks, and make the transition seamless. I've done this before and my managers can vouch for clean handovers.' This reassures them you won't leave things in a mess.",cat:"Salary & Culture"},
  {id:172,q:"What kind of work culture do you thrive in?",a:"I thrive in engineering-first cultures where data quality is non-negotiable, technical decisions are made by engineers (not just managers), blameless post-mortems are the norm, and there's investment in tooling and automation rather than relying on manual heroics.",cat:"Salary & Culture"},
  {id:173,q:"How do you feel about on-call expectations?",a:"On-call is expected at this level and I'm comfortable with it — I've handled P1 incidents at Accenture for years. What matters is: fair rotation, clear escalation paths, documented runbooks so on-call isn't detective work, and comp time or on-call pay. Toxic on-call with no support is a red flag.",cat:"Salary & Culture"},
  {id:174,q:"Do you prefer product companies or service companies?",a:"Product companies — because you own the system end-to-end, see long-term impact of your architecture decisions, and work with engineering peers rather than client-facing project constraints. Service companies build breadth; product companies build depth. I'm at the stage where depth matters more.",cat:"Salary & Culture"},
  {id:175,q:"How important is remote/hybrid work to you?",a:"Hybrid is ideal — 2-3 days in office for collaboration, architecture discussions, and whiteboard sessions. Remote for focused deep work like complex SQL optimization. Fully remote can work if the team has strong async communication. I don't want fully on-site — it signals old-school micromanagement.",cat:"Salary & Culture"},
  {id:176,q:"What questions should YOU ask about company culture?",a:"Ask: 'How does the team handle production incidents — is there a blameless culture?' 'What's the ratio of features vs tech debt in sprints?' 'How do engineers grow here — is there a defined career ladder?' 'Tell me about the last time the team pushed back on a deadline for quality reasons.' Their answers reveal more than any culture deck.",cat:"Salary & Culture"},
  {id:177,q:"How do you evaluate if a company values data engineering?",a:"Look for: dedicated data engineering team (not data dumped on backend devs), investment in tooling (not just manual SQL scripts), data quality metrics tracked as KPIs, data platform roadmap, and data engineers in leadership positions. If data is an afterthought, you'll be fighting organizational gravity.",cat:"Salary & Culture"},
  {id:178,q:"What are red flags in an interview process?",a:"Disorganized interview process (no structure, last-minute reschedules), vague job description that keeps changing, reluctance to discuss tech stack or team structure, no technical interview for a technical role, salary questions before understanding your value, and 'we work hard and play hard' (code for burnout culture).",cat:"Salary & Culture"},
  {id:179,q:"How do you negotiate salary at a product startup?",a:"Startups often can't match service company bases but offer ESOPs. Negotiate: higher ESOP grant (ask for percentage, not just number of options — dilution matters), accelerated vesting on promotion, clear cliff and vesting schedule, and a 6-month salary review clause. Understand the startup's funding stage and runway.",cat:"Salary & Culture"},
  {id:180,q:"What makes you accept one offer over another?",a:"Priority order: 1) Technical challenge and ownership level, 2) Team quality (I can learn from my peers), 3) Engineering culture (blameless, quality-focused), 4) Total compensation (not just base), 5) Growth path to Tech Lead/Principal. Salary alone won't make me accept a role where I'm a ticket executor.",cat:"Salary & Culture"},
  {id:181,q:"How do you handle counteroffers from your current employer?",a:"Decline gracefully. The reasons you wanted to leave (growth, culture, technical depth) don't disappear with more money. Counteroffers often create resentment from management. More practically: 80% of people who accept counteroffers leave within 6 months. Make the decision and commit.",cat:"Salary & Culture"},
  {id:182,q:"What do you know about our company's data challenges?",a:"Research before the interview: check their engineering blog, tech talks, Glassdoor reviews mentioning data, and any public case studies. Reference specifics: 'I read your blog post about migrating from monolithic SQL to a lakehouse — I'd love to understand how you handled the transition period.' This shows genuine interest.",cat:"Salary & Culture"},
  {id:183,q:"How do you discuss salary in a first interview?",a:"Don't anchor first — redirect to value: 'I'd love to understand the full scope of the role and what success looks like before discussing numbers. Can you share the compensation range for this level? That way I can tell you if we're in the same ballpark.' If they insist, give a wide range (18-24 LPA) based on role scope.",cat:"Salary & Culture"},
  {id:184,q:"What's your view on variable pay and bonuses?",a:"Variable pay is fine if the targets are transparent and achievable. I'd ask: what percentage is variable, what are the metrics, and what's the typical payout history? If variable is 30%+ with vague 'company performance' criteria, that's effectively a pay cut. Prefer higher fixed with modest variable.",cat:"Salary & Culture"},
  {id:185,q:"How do you handle a salary discussion after a great technical round?",a:"Leverage the momentum: 'The technical discussions confirmed this is a strong mutual fit. Based on what I can bring — especially the automation and monitoring expertise that directly reduces operational cost — I'd like to discuss compensation in the 20-22 LPA range. How does that align with your budget for this level?'",cat:"Salary & Culture"},

  // ── Advanced & Product Co (Q186–Q200) ──
  {id:186,q:"How is data engineering different at a product company vs a service company?",a:"Product: you own the full lifecycle — design, build, operate, iterate. Deep understanding of domain data. Long-term architecture decisions matter. Service: client-driven scope, frequent context switching, less ownership of outcomes. Product engineers develop more architectural judgment because they live with the consequences.",cat:"Advanced & Product Co"},
  {id:187,q:"What is a data platform and how do you build one?",a:"A data platform is an internal product that provides: reliable data ingestion, transformation, storage, serving, and discovery capabilities. Build incrementally: start with a well-modeled warehouse + ETL framework, add monitoring and quality gates, then expand to self-serve, data catalog, and API layer. Don't boil the ocean.",cat:"Advanced & Product Co"},
  {id:188,q:"How do you design for multi-tenant data isolation?",a:"Options: schema-per-tenant (moderate isolation, manageable at ~100 tenants), row-level security with tenant_id column (scales to thousands but requires discipline), or database-per-tenant (strongest isolation, operational overhead). Choose based on regulatory requirements and tenant count projections.",cat:"Advanced & Product Co"},
  {id:189,q:"What is event-driven architecture and when does it apply to data?",a:"Event-driven: systems communicate via events (Kafka, Event Hubs) rather than direct API calls. For data: use Change Data Capture events to trigger downstream pipelines in real-time instead of batch. Enables near-real-time analytics, decouples producers from consumers, and handles high-throughput data streams.",cat:"Advanced & Product Co"},
  {id:190,q:"How do you design a data model for a SaaS product?",a:"Start with the product's core entities and their relationships. Use tenant_id in every table for multi-tenancy. Design audit columns (created_at, updated_at, created_by) as standard. Plan for soft deletes. Use ENUM types for status fields. Model for the most common query patterns — don't over-normalize at the cost of read performance.",cat:"Advanced & Product Co"},
  {id:191,q:"What is a reverse ETL and why does it matter?",a:"Reverse ETL pushes data from the warehouse back to operational systems (CRM, marketing tools, support desks). Use case: sync customer segments from warehouse to Salesforce for targeted campaigns. Tools: Census, Hightouch. Matters because it closes the loop — warehouse insights become actionable in operational tools.",cat:"Advanced & Product Co"},
  {id:192,q:"How do you approach a greenfield data platform migration?",a:"Phase 1: Assess current state — map all data sources, volumes, consumers, and pain points. Phase 2: Design target architecture with future-proof storage (lakehouse). Phase 3: Migrate incrementally — start with non-critical data sources, validate, then migrate critical ones. Phase 4: Decommission legacy. Each phase has clear exit criteria.",cat:"Advanced & Product Co"},
  {id:193,q:"What is data contracts and why are they important?",a:"Data contracts are formal agreements between data producers and consumers defining schema, freshness, quality SLAs, and change notification process. Important because: they prevent downstream breakage from upstream changes, create accountability, and enable autonomous teams to work without constant coordination.",cat:"Advanced & Product Co"},
  {id:194,q:"How do you handle real-time analytics requirements?",a:"Understand the actual latency need — many 'real-time' requirements are satisfied with 5-15 minute delays. For true real-time: use Kafka + Flink/Spark Streaming for processing, materialized views or a serving layer (Redis, ClickHouse) for fast queries. For near-real-time: micro-batch with 1-5 minute intervals is simpler and often sufficient.",cat:"Advanced & Product Co"},
  {id:195,q:"What is ClickHouse and when would you use it?",a:"ClickHouse is a columnar OLAP database optimized for analytical queries on billions of rows with sub-second response times. Use for: real-time dashboards, log analytics, and high-cardinality group-by queries. Not for OLTP. Complements a data warehouse by serving as a fast analytical cache layer.",cat:"Advanced & Product Co"},
  {id:196,q:"How do you design for data governance at a product company?",a:"Implement: column-level classification (PII, financial, internal), row-level access control based on user roles, audit logging for all data access, data retention policies with automated deletion, and a data catalog documenting all datasets with ownership. Start with PII — it has the highest regulatory risk.",cat:"Advanced & Product Co"},
  {id:197,q:"What is the medallion architecture (bronze/silver/gold)?",a:"Medallion architecture organizes data into layers: Bronze (raw ingestion, full fidelity), Silver (cleaned, deduplicated, conformed to standard schema), Gold (business-level aggregates, dimensionally modeled for BI). Popularized by Databricks. Each layer adds progressive quality — enables both data science on raw data and BI on curated data.",cat:"Advanced & Product Co"},
  {id:198,q:"How do you approach A/B test data infrastructure?",a:"Need: experiment assignment table (user_id, experiment_id, variant, start/end), event tables tracking user actions by experiment, and aggregation queries for metric calculation (conversion rate, revenue per user). Design for low latency — experiment teams need results quickly. Ensure assignment is logged before treatment to avoid selection bias.",cat:"Advanced & Product Co"},
  {id:199,q:"What is a feature store and do you need one?",a:"A feature store centralizes ML feature computation and serving — prevents training-serving skew and duplicate computation. Tools: Feast, Tecton. You need one when: multiple ML models share features, feature computation is expensive, or you need point-in-time correct features for training. Overkill if you have 1-2 simple models.",cat:"Advanced & Product Co"},
  {id:200,q:"How do you present a data platform roadmap to leadership?",a:"Structure: 1) Current pain points with quantified cost (hours lost, incidents, manual effort). 2) Proposed initiatives ranked by business impact. 3) Timeline with quick wins in month 1 (visibility wins). 4) Resource needs (headcount, tooling budget). 5) Success metrics. Keep it business-outcome driven, not technology-driven. Leadership funds problems solved, not tech adopted.",cat:"Advanced & Product Co"},
];

  {name:"Core SQL",color:"#e8a630",icon:"fa-database"},
  {name:"Performance Tuning",color:"#f87171",icon:"fa-gauge-high"},
  {name:"Data Engineering",color:"#60a5fa",icon:"fa-gears"},
  {name:"Production Support",color:"#a78bfa",icon:"fa-shield-halved"},
  {name:"Tech Lead / Leadership",color:"#34d399",icon:"fa-users-gear"},
  {name:"Behavioural",color:"#fb923c",icon:"fa-comments"},
  {name:"Scenario-Based",color:"#f472b6",icon:"fa-flask"},
  {name:"Tools & Cloud",color:"#38bdf8",icon:"fa-cloud"},
