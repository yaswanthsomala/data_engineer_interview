<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Prep — Dhamini Kanchiraju</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e11;
    --bg-elevated: #16161a;
    --bg-card: #1c1c22;
    --bg-hover: #24242c;
    --fg: #ececf0;
    --fg-muted: #8888a0;
    --fg-dim: #55556a;
    --accent: #e8a630;
    --accent-dim: rgba(232,166,48,0.12);
    --accent-glow: rgba(232,166,48,0.25);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --border: #2a2a35;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --font: 'Space Grotesk', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size: 15px; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
  }
  ::selection { background: var(--accent); color: var(--bg); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-dim); }

  .bg-glow {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bg-glow::before {
    content: ''; position: absolute;
    top: -20%; right: -10%; width: 600px; height: 600px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    filter: blur(100px); opacity: 0.4;
    animation: floatGlow 20s ease-in-out infinite;
  }
  .bg-glow::after {
    content: ''; position: absolute;
    bottom: -10%; left: -10%; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(96,165,250,0.1) 0%, transparent 70%);
    filter: blur(100px); opacity: 0.3;
    animation: floatGlow 25s ease-in-out infinite reverse;
  }
  @keyframes floatGlow {
    0%,100% { transform: translate(0,0); }
    33% { transform: translate(40px,-30px); }
    66% { transform: translate(-20px,20px); }
  }

  .app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

  .sidebar {
    width: 280px; min-width: 280px;
    background: var(--bg-elevated);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    height: 100vh; position: sticky; top: 0;
    overflow: hidden;
    transition: transform 0.3s ease;
    z-index: 100;
  }
  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header .brand {
    display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
  }
  .sidebar-header .brand-icon {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--accent), #d4871a);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--bg); font-weight: 700;
  }
  .sidebar-header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.3px; }
  .sidebar-header .subtitle { font-size: 0.75rem; color: var(--fg-muted); margin-top: 2px; }
  .sidebar-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .stat-card {
    background: var(--bg); border-radius: var(--radius-xs);
    padding: 10px 12px;
  }
  .stat-card .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .stat-card .stat-label { font-size: 0.65rem; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .mode-tabs {
    display: flex; padding: 12px 20px; gap: 4px;
    border-bottom: 1px solid var(--border);
  }
  .mode-tab {
    flex: 1; padding: 8px 4px; border: none; background: transparent;
    color: var(--fg-muted); font-family: var(--font); font-size: 0.72rem;
    font-weight: 500; border-radius: var(--radius-xs); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: all 0.2s;
  }
  .mode-tab i { font-size: 1rem; }
  .mode-tab:hover { color: var(--fg); background: var(--bg-hover); }
  .mode-tab.active { color: var(--accent); background: var(--accent-dim); }

  .cat-list { flex: 1; overflow-y: auto; padding: 8px 10px; }
  .cat-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.15s; margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .cat-item:hover { background: var(--bg-hover); }
  .cat-item.active { background: var(--accent-dim); border-color: var(--accent); }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-item .cat-name { font-size: 0.82rem; font-weight: 500; flex: 1; }
  .cat-item .cat-count {
    font-size: 0.7rem; color: var(--fg-dim);
    background: var(--bg); padding: 2px 7px; border-radius: 10px;
  }
  .cat-progress { height: 2px; background: var(--bg); border-radius: 1px; margin-top: 4px; }
  .cat-progress-fill { height: 100%; border-radius: 1px; background: var(--accent); transition: width 0.4s ease; }

  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(14,14,17,0.85); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; gap: 16px;
  }
  .hamburger {
    display: none; background: none; border: none; color: var(--fg);
    font-size: 1.2rem; cursor: pointer; padding: 4px;
  }
  .search-box { flex: 1; max-width: 500px; position: relative; }
  .search-box i {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--fg-dim); font-size: 0.85rem;
  }
  .search-box input {
    width: 100%; padding: 10px 14px 10px 38px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--fg);
    font-family: var(--font); font-size: 0.85rem;
    outline: none; transition: border-color 0.2s;
  }
  .search-box input::placeholder { color: var(--fg-dim); }
  .search-box input:focus { border-color: var(--accent); }
  .topbar-actions { display: flex; gap: 8px; margin-left: auto; }
  .top-btn {
    padding: 8px 14px; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--fg-muted);
    border-radius: var(--radius-xs); font-family: var(--font);
    font-size: 0.78rem; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .top-btn:hover { border-color: var(--fg-dim); color: var(--fg); }
  .top-btn.accent { border-color: var(--accent); color: var(--accent); }
  .top-btn.accent:hover { background: var(--accent-dim); }

  .content { flex: 1; padding: 24px 28px 60px; }

  .browse-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .browse-header h2 { font-size: 1.3rem; font-weight: 600; }
  .browse-header .count { color: var(--fg-muted); font-size: 0.85rem; }

  .qa-list { display: flex; flex-direction: column; gap: 8px; }
  .qa-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: border-color 0.2s;
  }
  .qa-card:hover { border-color: var(--fg-dim); }
  .qa-card.mastered { border-left: 3px solid var(--green); }
  .qa-card.bookmarked { border-left: 3px solid var(--accent); }
  .qa-card.struggling { border-left: 3px solid var(--red); }

  .qa-q {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 16px 20px; cursor: pointer; user-select: none;
  }
  .qa-num {
    font-family: var(--mono); font-size: 0.72rem; color: var(--fg-dim);
    background: var(--bg); padding: 4px 8px; border-radius: var(--radius-xs);
    white-space: nowrap; margin-top: 1px;
  }
  .qa-q-text { flex: 1; font-size: 0.92rem; font-weight: 500; line-height: 1.5; }
  .qa-q-actions { display: flex; gap: 4px; flex-shrink: 0; margin-top: 1px; }
  .qa-action-btn {
    width: 30px; height: 30px; border: none; background: transparent;
    color: var(--fg-dim); border-radius: var(--radius-xs);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; transition: all 0.15s;
  }
  .qa-action-btn:hover { background: var(--bg-hover); color: var(--fg); }
  .qa-action-btn.bookmarked-btn { color: var(--accent); }
  .qa-action-btn.mastered-btn { color: var(--green); }
  .qa-action-btn.struggling-btn { color: var(--red); }

  .qa-a { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
  .qa-a.open { max-height: 600px; }
  .qa-a-inner {
    padding: 0 20px 18px 56px;
    font-size: 0.85rem; color: var(--fg-muted); line-height: 1.7;
  }
  .qa-a-inner code {
    font-family: var(--mono); font-size: 0.8rem;
    background: var(--bg); padding: 2px 6px; border-radius: 4px;
    color: var(--accent);
  }
  .qa-tag {
    display: inline-block; font-size: 0.65rem; font-weight: 500;
    padding: 2px 8px; border-radius: 10px; margin-right: 8px;
    vertical-align: middle;
  }
  .expand-icon {
    transition: transform 0.3s ease; color: var(--fg-dim); font-size: 0.75rem;
    flex-shrink: 0; margin-top: 4px;
  }
  .qa-card.open .expand-icon { transform: rotate(180deg); }

  .flashcard-container {
    display: flex; flex-direction: column; align-items: center;
    padding-top: 40px; min-height: calc(100vh - 180px);
  }
  .flashcard-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; font-size: 0.82rem; color: var(--fg-muted); }
  .flashcard-progress-bar { width: 200px; height: 4px; background: var(--bg-card); border-radius: 2px; overflow: hidden; }
  .flashcard-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .flashcard { width: 100%; max-width: 680px; min-height: 340px; perspective: 1200px; cursor: pointer; margin-bottom: 28px; }
  .flashcard-inner {
    width: 100%; min-height: 340px; position: relative;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
    transform-style: preserve-3d;
  }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
  .flashcard-front, .flashcard-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 16px; padding: 36px 32px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .flashcard-front { background: var(--bg-card); border: 1px solid var(--border); }
  .flashcard-back {
    background: linear-gradient(135deg, #1a1a24, #1e1e2a);
    border: 1px solid var(--accent);
    transform: rotateY(180deg);
  }
  .flashcard-front .fc-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--fg-dim); margin-bottom: 16px; }
  .flashcard-front .fc-question { font-size: 1.2rem; font-weight: 600; line-height: 1.5; }
  .flashcard-front .fc-hint { margin-top: 20px; font-size: 0.78rem; color: var(--fg-dim); display: flex; align-items: center; gap: 6px; }
  .flashcard-back .fc-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 16px; }
  .flashcard-back .fc-answer { font-size: 0.95rem; color: var(--fg-muted); line-height: 1.75; }
  .flashcard-back code { font-family: var(--mono); font-size: 0.82rem; background: var(--bg); padding: 2px 6px; border-radius: 4px; color: var(--accent); }
  .fc-btns { display: flex; gap: 12px; }
  .fc-btn {
    padding: 12px 28px; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--fg);
    border-radius: var(--radius-sm); font-family: var(--font);
    font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .fc-btn:hover { border-color: var(--fg-dim); background: var(--bg-hover); }
  .fc-btn.green:hover { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .fc-btn.red:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }
  .fc-btn.skip:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

  .quiz-container { max-width: 700px; margin: 0 auto; padding-top: 20px; }
  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .quiz-header h2 { font-size: 1.2rem; font-weight: 600; }
  .quiz-score { display: flex; align-items: center; gap: 16px; font-size: 0.85rem; }
  .quiz-score span { color: var(--fg-muted); }
  .quiz-score strong { color: var(--accent); }
  .quiz-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin-bottom: 20px; }
  .quiz-q-num { font-size: 0.72rem; color: var(--fg-dim); font-family: var(--mono); margin-bottom: 12px; }
  .quiz-q-text { font-size: 1.1rem; font-weight: 500; line-height: 1.5; margin-bottom: 24px; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt {
    padding: 14px 18px; border: 1px solid var(--border);
    background: var(--bg); border-radius: var(--radius-sm);
    cursor: pointer; font-size: 0.88rem; transition: all 0.15s;
    display: flex; align-items: flex-start; gap: 12px; line-height: 1.5;
  }
  .quiz-opt:hover:not(.disabled) { border-color: var(--fg-dim); background: var(--bg-hover); }
  .quiz-opt .opt-letter {
    font-family: var(--mono); font-size: 0.75rem; color: var(--fg-dim);
    background: var(--bg-card); padding: 2px 8px; border-radius: 4px;
    flex-shrink: 0; margin-top: 1px;
  }
  .quiz-opt.correct { border-color: var(--green); background: var(--green-dim); }
  .quiz-opt.correct .opt-letter { color: var(--green); background: rgba(52,211,153,0.2); }
  .quiz-opt.wrong { border-color: var(--red); background: var(--red-dim); }
  .quiz-opt.wrong .opt-letter { color: var(--red); background: rgba(248,113,113,0.2); }
  .quiz-opt.disabled { pointer-events: none; opacity: 0.7; }
  .quiz-explanation {
    margin-top: 20px; padding: 16px; background: var(--bg);
    border-radius: var(--radius-sm); border-left: 3px solid var(--accent);
    font-size: 0.84rem; color: var(--fg-muted); line-height: 1.65;
    display: none;
  }
  .quiz-explanation.show { display: block; animation: fadeUp 0.3s ease; }
  .quiz-next {
    padding: 12px 24px; background: var(--accent); color: var(--bg);
    border: none; border-radius: var(--radius-sm); font-family: var(--font);
    font-size: 0.88rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; display: none;
  }
  .quiz-next.show { display: inline-flex; animation: fadeUp 0.3s ease; }
  .quiz-next:hover { filter: brightness(1.1); }

  .quiz-setup { max-width: 500px; margin: 60px auto; text-align: center; }
  .quiz-setup h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
  .quiz-setup p { color: var(--fg-muted); margin-bottom: 28px; font-size: 0.9rem; }
  .quiz-setup-options { display: flex; flex-direction: column; gap: 10px; text-align: left; margin-bottom: 28px; }
  .quiz-setup-opt {
    padding: 14px 18px; border: 1px solid var(--border);
    background: var(--bg-card); border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .quiz-setup-opt:hover { border-color: var(--fg-dim); }
  .quiz-setup-opt.selected { border-color: var(--accent); background: var(--accent-dim); }
  .quiz-setup-opt span { font-size: 0.9rem; }
  .quiz-setup-opt small { color: var(--fg-dim); font-size: 0.75rem; }
  .quiz-start-btn {
    padding: 14px 36px; background: var(--accent); color: var(--bg);
    border: none; border-radius: var(--radius-sm); font-family: var(--font);
    font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .quiz-start-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

  .quiz-results { max-width: 500px; margin: 60px auto; text-align: center; }
  .quiz-results .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    margin: 0 auto 24px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border: 4px solid var(--accent);
  }
  .quiz-results .score-circle .pct { font-size: 2.2rem; font-weight: 700; color: var(--accent); }
  .quiz-results .score-circle .lbl { font-size: 0.72rem; color: var(--fg-muted); }
  .quiz-results h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
  .quiz-results p { color: var(--fg-muted); margin-bottom: 24px; }
  .quiz-results .stats-row { display: flex; justify-content: center; gap: 28px; margin-bottom: 28px; }
  .quiz-results .stat-item { text-align: center; }
  .quiz-results .stat-item .val { font-size: 1.3rem; font-weight: 700; }
  .quiz-results .stat-item .val.green { color: var(--green); }
  .quiz-results .stat-item .val.red { color: var(--red); }
  .quiz-results .stat-item .lbl { font-size: 0.7rem; color: var(--fg-dim); text-transform: uppercase; }
  .result-btns { display: flex; gap: 12px; justify-content: center; }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--fg-dim); }
  .empty-state i { font-size: 3rem; margin-bottom: 16px; display: block; }
  .empty-state p { font-size: 0.9rem; }

  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    padding: 12px 20px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 0.82rem; color: var(--fg);
    animation: slideInRight 0.3s ease, fadeOut 0.3s ease 2.5s forwards;
    display: flex; align-items: center; gap: 10px;
  }
  .toast i { color: var(--accent); }

  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
  .sidebar-overlay.show { display: block; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

  @media (max-width: 768px) {
    .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .hamburger { display: block; }
    .content { padding: 16px; }
    .topbar { padding: 12px 16px; }
    .qa-a-inner { padding-left: 20px; }
    .flashcard { min-height: 280px; }
    .flashcard-front, .flashcard-back { min-height: 280px; padding: 24px 20px; }
    .flashcard-front .fc-question { font-size: 1.05rem; }
    .fc-btns { flex-wrap: wrap; justify-content: center; }
    .top-btn span { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  /* ── Code block styles ── */
  .answer-section { display: flex; flex-direction: column; gap: 14px; }
  .answer-label {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--fg-dim);
    display: flex; align-items: center; gap: 8px;
  }
  .answer-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .answer-text { font-size: 0.9rem; color: var(--fg-muted); line-height: 1.75; }
  .answer-text code { font-family: var(--mono); font-size: 0.8rem; background: var(--bg-card); padding: 2px 6px; border-radius: 4px; color: var(--accent); }
  .answer-text strong { color: var(--fg); font-weight: 600; }
  .code-block {
    background: #0d0d11; border: 1px solid #1e1e2a;
    border-radius: var(--radius-sm); overflow: hidden;
    animation: fadeUp 0.3s ease;
  }
  .code-block-header {
    background: #111118; padding: 8px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #1e1e2a;
  }
  .code-block-dots { display: flex; gap: 6px; }
  .code-block-dots span {
    width: 12px; height: 12px; border-radius: 50%;
  }
  .code-block-dots span:nth-child(1) { background: #ff5f56; }
  .code-block-dots span:nth-child(2) { background: #ffbd2e; }
  .code-block-dots span:nth-child(3) { background: #27c93f; }
  .code-block-label {
    font-family: var(--mono); font-size: 0.68rem;
